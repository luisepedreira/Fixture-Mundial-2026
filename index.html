<style>
:root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;--accent:#c8a84b;--arg:#74b2e0;--text:#e8e8f0;--muted:#6b6b85;--green:#22c55e;--red:#ef4444;--yellow:#eab308;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
/* HEADER */
.header{background:linear-gradient(135deg,#0a0a0f 0%,#161620 100%);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.live-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:1px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-top:4px;}
.tab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;user-select:none;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* CONTENT */
.content{padding:12px;}
.pane{display:none;}
.pane.active{display:block;}
/* FILTERS */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* DAY */
.day-group{margin-bottom:18px;}
.day-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 4px 8px;display:flex;align-items:center;gap:8px;}
.day-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
/* MATCH CARD */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;position:relative;}
.mcard.arg{border-left:3px solid var(--arg);}
.mcard.live-card{border-color:var(--red);}
.mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mmeta-l{}
.mgrp{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.arg-lbl{display:inline-block;background:rgba(116,178,224,.15);color:var(--arg);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:10px;text-transform:uppercase;margin-top:3px;}
.mmeta-r{text-align:right;}
.mtime{font-size:12px;color:var(--accent);font-weight:700;}
.mtime.live-time{color:var(--red);}
.mvenue{font-size:10px;color:var(--muted);margin-top:1px;}
.mnote{font-size:9px;color:var(--muted);margin-top:2px;font-style:italic;}
.mteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.mteam{display:flex;flex-direction:column;gap:4px;}
.mteam.home{align-items:flex-start;}
.mteam.away{align-items:flex-end;}
.mflag{line-height:1;width:32px;height:24px;display:flex;align-items:center;}
.mname{font-size:12px;font-weight:700;color:var(--text);}
.mteam.away .mname{text-align:right;}
.sbox{display:flex;flex-direction:column;align-items:center;gap:3px;}
.snums{display:flex;gap:4px;align-items:center;}
.snum{background:var(--surface);border:1px solid var(--border);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);border-radius:6px;}
.snum.scored{background:rgba(200,168,75,.12);border-color:var(--accent);color:var(--accent);}
.ssep{color:var(--muted);font-size:14px;font-weight:700;}
.sstatus{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.sstatus.ft{color:var(--muted);}
.sstatus.live{color:var(--red);}
.sstatus.ht{color:var(--yellow);}

.groups-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.groups-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.rbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.spin{animation:spin .8s linear infinite;display:inline-block;}

.lupd{font-size:10px;color:var(--muted);text-align:center;margin-bottom:12px;}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.gtitle{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--accent);display:flex;justify-content:space-between;align-items:center;}
.gtitle span{font-family:'Inter',sans-serif;font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0;}
.gtbl{width:100%;border-collapse:collapse;}
.gtbl th{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:5px 4px;text-align:center;}
.gtbl th:first-child{text-align:left;padding-left:10px;}
.gtbl td{padding:6px 4px;text-align:center;font-size:11px;font-weight:600;border-top:1px solid var(--border);}
.gtbl td:first-child{text-align:left;padding-left:10px;}
.trow{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;}
.trow .fl{width:18px;height:14px;display:flex;align-items:center;}
.pts{color:var(--accent);font-weight:700;}
.gtbl tbody tr:nth-child(1) td,.gtbl tbody tr:nth-child(2) td{background:rgba(34,197,94,.04);}
.gtbl tbody tr:nth-child(1) td:first-child,.gtbl tbody tr:nth-child(2) td:first-child{border-left:3px solid rgba(34,197,94,.5);}
.argrow td{background:rgba(116,178,224,.08)!important;}
.argrow td:first-child{border-left:3px solid var(--arg)!important;}
/* KNOCKOUT */
.ko-sec{margin-bottom:16px;}
.ko-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px;padding:0 4px 10px;display:flex;align-items:center;gap:8px;}
.ko-ttl::after{content:'';flex:1;height:1px;background:var(--border);}
.ko-dates{font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0;}
.kocard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;}
.kocard.arg{border-left:3px solid var(--arg);}
.kocard.live-card{border-color:var(--red);}
.kotop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.konum{font-size:10px;color:var(--muted);font-weight:600;}
.kometaR{text-align:right;}
.kotime{font-size:11px;color:var(--accent);font-weight:700;}
.kovenue{font-size:10px;color:var(--muted);margin-top:1px;}
.koteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.koteam{display:flex;flex-direction:column;gap:3px;}
.koteam.home{align-items:flex-start;}
.koteam.away{align-items:flex-end;}
.koflag{line-height:1;width:27px;height:20px;display:flex;align-items:center;}

.koteam.away .kodesc{text-align:right;}
.kosbox{display:flex;gap:3px;align-items:center;}
.kosnum{background:var(--surface);border:1px solid var(--border);width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);border-radius:5px;}
.kosnum.scored{background:rgba(200,168,75,.1);border-color:var(--accent);color:var(--accent);}
::-webkit-scrollbar{width:0;}
.empty{text-align:center;color:var(--muted);padding:30px 20px;font-size:13px;}
.foot-note{text-align:center;color:var(--muted);font-size:10px;padding:16px 0 24px;}

.ko-legend{border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;line-height:1.6;border:1px solid;}
.ko-legend.pending{background:rgba(234,179,8,.05);border-color:rgba(234,179,8,.2);color:#a89030;}
.ko-legend.inprogress{background:rgba(59,130,246,.05);border-color:rgba(59,130,246,.2);color:#7ab0e0;}
.ko-legend.done{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2);color:#4ade80;}
.ko-legend strong{font-weight:700;color:inherit;}
/* Provisional team name (leading but not confirmed) */
.provisional{color:var(--yellow)!important;font-style:italic;}
</style>

// ─────────────────────────────────────────────
// TIMEZONE HELPER: ET (UTC-4 summer) → ARG (UTC-3)
// ARG = ET + 1 hour
// ─────────────────────────────────────────────
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTH_DAYS = {Jun:30,Jul:31};

function etToArg(etDateLabel, etH, etM) {
  // etDateLabel: e.g. "Jue 11 Jun"
  let argH = etH + 1;
  let [dn, dd, mon] = etDateLabel.split(' ');
  let dayNum = parseInt(dd);
  if (argH >= 24) {
    argH -= 24;
    dayNum++;
    if (dayNum > MONTH_DAYS[mon]) { dayNum = 1; mon = 'Jul'; }
    const di = DAYS_ES.indexOf(dn);
    dn = DAYS_ES[(di + 1) % 7];
  }
  const pad = n => n.toString().padStart(2,'0');
  return { time: `${pad(argH)}:${pad(etM)}`, date: `${dn} ${dayNum} ${mon}` };
}

// Stores ESPN event data keyed by "Home vs Away" normalised
let liveScores = {};       // "Mexico_SouthAfrica" → {hs, as, status, min}
let standingsData = {};    // group letter → [{name,pj,pg,pe,pp,gf,gc,dg,pts}]
let espnLoaded = false;

const ESPN_SCORE_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260611-20260719';
const ESPN_STAND_URL = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026';
const PROXY = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

const TEAM_MAP = {
  'United States':'USA','US':'USA','Türkiye':'Turkiye','Turkey':'Turkiye',
  "Côte d'Ivoire":'Ivory Coast',"Cote d'Ivoire":'Ivory Coast',
  'Curaçao':'Curacao','Bosnia and Herzegovina':'Bosnia','Bosnia & Herzegovina':'Bosnia',
  'Korea Republic':'South Korea','Republic of Korea':'South Korea',
  'Congo DR':'DR Congo','Democratic Republic of Congo':'DR Congo',
  'Cabo Verde':'Cape Verde',
};
const norm = name => TEAM_MAP[name] || name;

async function fetchJSON(url) {
  try {
    const r = await fetch(PROXY(url), {signal:AbortSignal.timeout(7000)});
    if (r.ok) return await r.json();
  } catch{}
  try {
    const r2 = await fetch(url, {signal:AbortSignal.timeout(5000)});
    if (r2.ok) return await r2.json();
  } catch{}
  return null;
}

async function loadLiveData() {
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('spin');
  document.getElementById('lastUpdate').textContent = 'Actualizando...';

  const [scoreData, standData] = await Promise.all([
    fetchJSON(ESPN_SCORE_URL),
    fetchJSON(ESPN_STAND_URL),
  ]);

  // Parse scores
  liveScores = {};
  let hasLive = false;
  if (scoreData && scoreData.events) {
    scoreData.events.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const [c1, c2] = comp.competitors || [];
      if (!c1 || !c2) return;
      // ESPN: competitor with homeAway='home' is home
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      if (!home || !away) return;
      const hn = norm(home.team?.displayName || home.team?.name || '');
      const an = norm(away.team?.displayName || away.team?.name || '');
      const status = ev.status?.type?.name || ''; // STATUS_SCHEDULED, STATUS_IN_PROGRESS, STATUS_FINAL
      const clock = ev.status?.displayClock || '';
      const period = ev.status?.period || 0;
      const hs = home.score ?? '-';
      const as_ = away.score ?? '-';
      const key = `${hn}|${an}`;
      liveScores[key] = { hs, as: as_, status, clock, period };
      if (status === 'STATUS_IN_PROGRESS') hasLive = true;
    });
  }

  // Parse standings
  standingsData = {};
  if (standData?.children) {
    standData.children.forEach(group => {
      const raw = group.name || group.abbreviation || '';
      const letter = raw.replace(/.*\s/,'').toUpperCase();
      if (!letter || !/^[A-L]$/.test(letter)) return;
      const entries = group.standings?.entries || [];
      standingsData[letter] = entries.map(e => {
        const s = {};
        (e.stats||[]).forEach(x => { s[x.abbreviation || x.name] = parseFloat(x.value)||0; });
        return {
          name: norm(e.team?.displayName || ''),
          pj: s.GP||s.gamesPlayed||0,
          pg: s.W||s.wins||0,
          pe: s.T||s.ties||0,
          pp: s.L||s.losses||0,
          gf: s.GF||0,
          gc: s.GA||0,
          dg: s.GD||s.pointDifferential||0,
          pts: s.PTS||s.points||0,
        };
      }).sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
    });
  }

  espnLoaded = true;
  document.getElementById('liveBadge').style.display = hasLive ? 'block' : 'none';

  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Actualizado ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ESPN`;

  renderMatches();
  renderGroups();
  renderKO();
  icon.classList.remove('spin');
}

function getScore(hn, an) {
  return liveScores[`${hn}|${an}`] || null;
}

function statusLabel(sc) {
  if (!sc) return '';
  if (sc.status === 'STATUS_FINAL') return 'FT';
  if (sc.status === 'STATUS_HALFTIME') return 'ET';
  if (sc.status === 'STATUS_IN_PROGRESS') return sc.clock ? sc.clock+"'" : 'VIVO';
  return '';
}
function statusClass(sc) {
  if (!sc) return '';
  if (sc.status === 'STATUS_FINAL') return 'ft';
  if (sc.status === 'STATUS_IN_PROGRESS' || sc.status === 'STATUS_HALFTIME') return 'live';
  return '';
}

// ─────────────────────────────────────────────
// QUALIFIER CALCULATION
// ─────────────────────────────────────────────
const MATCHES_PER_GROUP = 6;

function getGroupStandings(letter) {
  const src = standingsData[letter];
  if (!src || !src.length)
    return GROUPS_STATIC[letter].map(name => ({name,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0}));
  return [...src].sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
}

function groupMatchesPlayed(letter) {
  const teams = GROUPS_STATIC[letter] || [];
  let count = 0;
  Object.entries(liveScores).forEach(([key, sc]) => {
    if (sc.status !== 'STATUS_FINAL') return;
    const [h, a] = key.split('|');
    if (teams.includes(h) && teams.includes(a)) count++;
  });
  return count;
}

function allGroupsFinished() {
  return Object.keys(GROUPS_STATIC).every(l => groupMatchesPlayed(l) >= MATCHES_PER_GROUP);
}
function someGroupsStarted() {
  return Object.keys(GROUPS_STATIC).some(l => groupMatchesPlayed(l) > 0);
}

// Returns {name, confirmed} or null
function getClassified(groupLetter, position) {
  const standings = getGroupStandings(groupLetter);
  const played = groupMatchesPlayed(groupLetter);
  const team = standings[position - 1];
  if (!team || team.pj === 0) return null;
  const confirmed = played >= MATCHES_PER_GROUP;
  return { name: team.name, confirmed };
}

// ─────────────────────────────────────────────
// BEST THIRDS — real-time ranking
// Returns array of up to 12 objects sorted by pts/DG/GF
// each: {name, group, pts, dg, gf, pj, confirmed}
// ─────────────────────────────────────────────
function getAllThirds() {
  const thirds = [];
  Object.keys(GROUPS_STATIC).forEach(letter => {
    const standings = getGroupStandings(letter);
    const played = groupMatchesPlayed(letter);
    const t = standings[2];
    if (t && t.pj > 0) {
      thirds.push({ ...t, group: letter, confirmed: played >= MATCHES_PER_GROUP });
    }
  });
  return thirds.sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
}

function getBestThirds() {
  return getAllThirds().slice(0, 8);
}

// ─────────────────────────────────────────────
// FIFA 2026 THIRD-PLACE BRACKET ASSIGNMENT
// The slot label in R32 lists which groups' thirds can fill it.
// Once all groups finish, we know the exact 8 best thirds and
// their source groups → we map each slot to the right team.
//
// Slot format: "3ro A/B/C/D/F" means: the best third from
// among groups A, B, C, D, F (whichever qualified) goes here.
// Since FIFA hasn't published the exact 2026 assignment table yet,
// we use the logical approach: parse the groups listed in the slot,
// intersect with the actual best-8 thirds' groups, pick the match.
// ─────────────────────────────────────────────
function resolveThirdSlot(slot) {
  // slot like "3ro A/B/C/D/F"
  const groupsInSlot = slot.replace('3ro ','').split('/');
  const best8 = getBestThirds();
  const best8groups = best8.map(t => t.group);

  // Teams in the best 8 whose group is listed in this slot
  const candidates = best8.filter(t => groupsInSlot.includes(t.group));

  if (candidates.length === 0) return null;

  // If all groups are finished we know for sure
  const allDone = allGroupsFinished();

  // Best candidate = first in sorted order (already sorted by pts/DG/GF)
  const best = candidates[0];

  // "Confirmed" only when all groups are done AND we have enough thirds
  return { name: best.name, confirmed: allDone && best8.length >= 8, provisional: !allDone };
}

// ─────────────────────────────────────────────
// RESOLVE ANY SLOT
// ─────────────────────────────────────────────
function resolveSlot(slot) {
  const m1 = slot.match(/^1ro Grupo ([A-L])$/);
  if (m1) return getClassified(m1[1], 1);
  const m2 = slot.match(/^2do Grupo ([A-L])$/);
  if (m2) return getClassified(m2[1], 2);
  if (slot.startsWith('3ro')) return resolveThirdSlot(slot);
  // KO stage winners/losers — not resolvable from group data
  if (slot.startsWith('Gan.') || slot.startsWith('Perd.')) return null;
  return null;
}

      <td style="padding:5px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--accent)">${t.pts}</td>
      <td style="padding:5px 8px;text-align:center;font-size:11px;color:var(--muted)">${t.dg>0?'+':''}${t.dg}</td>
      <td style="padding:5px 8px;text-align:center;font-size:11px;color:var(--muted)">${t.gf}</td>
      <td style="padding:5px 8px;text-align:center">
        ${isQ
          ? `<span style="font-size:9px;font-weight:700;color:var(--green);background:rgba(34,197,94,.1);padding:2px 6px;border-radius:10px">CLASIFICA</span>`
          : `<span style="font-size:9px;color:var(--muted)">–</span>`}
      </td>
    </tr>`;
  }).join('');

  const allDone = allGroupsFinished();
  const note = allDone
    ? `<div style="font-size:10px;color:var(--green);text-align:center;padding:8px">✅ Clasificación de terceros confirmada</div>`
    : `<div style="font-size:10px;color:var(--muted);text-align:center;padding:8px">En tiempo real · Se actualiza a medida que terminan los partidos</div>`;

  return `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px">
    <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);letter-spacing:1px;display:flex;justify-content:space-between;align-items:center">
      Ranking Mejores 3ros
      <span style="font-family:'Inter',sans-serif;font-size:9px;color:var(--muted);font-weight:600">Clasifican los 8 primeros</span>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:left">#</th>
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:left">Equipo</th>
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:center">Pts</th>
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:center">DG</th>
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:center">GF</th>
          <th style="padding:5px 8px;font-size:9px;color:var(--muted);text-align:center"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    ${note}
  </div>`;
}

// ─────────────────────────────────────────────
// KNOCKOUT RENDER
// ─────────────────────────────────────────────
function koMatchHTML(m) {
  const {time, date} = etToArg(m.d, m.et[0], m.et[1]);

  // Resolve teams from standings if not hardcoded
  const hResolved = m.hTeam ? {name: m.hTeam, confirmed: true} : resolveSlot(m.h);
  const aResolved = m.aTeam ? {name: m.aTeam, confirmed: true} : resolveSlot(m.a);

  const hName = hResolved ? hResolved.name : m.h;
  const aName = aResolved ? aResolved.name : m.a;
  const hKnown = !!hResolved;
  const aKnown = !!aResolved;
  const hConfirmed = hResolved?.confirmed;
  const aConfirmed = aResolved?.confirmed;

  const hFlagHTML = hKnown ? flag(hResolved.name, 20) : '<span style="font-size:18px;opacity:.3">⬜</span>';
  const aFlagHTML = aKnown ? flag(aResolved.name, 20) : '<span style="font-size:18px;opacity:.3">⬜</span>';

  // Score only if both teams are real known teams
  const sc = (hResolved && aResolved && m.hTeam && m.aTeam) ? getScore(hResolved.name, aResolved.name) : null;
  const hasScore = sc && sc.status !== 'STATUS_SCHEDULED';
  const isLive = sc && sc.status === 'STATUS_IN_PROGRESS';
  const sLabel = statusLabel(sc);
  const sClass = statusClass(sc);

  return `<div class="kocard${isLive?' live-card':''}">
    <div class="kotop">
      <div><div class="konum">${m.n}</div></div>
      <div class="kometaR">
        <div class="kotime${isLive?' live-time':''}">${isLive?'🔴 VIVO':time+' hs · '+date}</div>
        <div class="kovenue">${m.v}</div>
      </div>
    </div>
    <div class="koteams">
      <div class="koteam home">
        <div class="koflag">${hFlagHTML}</div>
        <div class="koname${!hKnown?' kodesc':''}${hKnown&&!hConfirmed?' provisional':''}">${hName}</div>
      </div>
      <div class="kosbox">
        <div class="kosnum${hasScore?' scored':''}">${hasScore?sc.hs:'-'}</div>
        <div style="color:var(--muted);font-size:12px;margin:0 2px">:</div>
        <div class="kosnum${hasScore?' scored':''}">${hasScore?sc.as:'-'}</div>
      </div>
      <div class="koteam away">
        <div class="koflag">${aFlagHTML}</div>
        <div class="koname${!aKnown?' kodesc':''}${aKnown&&!aConfirmed?' provisional':''}" style="text-align:right">${aName}</div>
      </div>
    </div>
    ${sLabel?`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--${sClass==='live'?'red':'muted'});margin-top:6px;text-transform:uppercase">${sLabel}</div>`:''}
  </div>`;
}

function koSection(title, dates, matches) {
  return `<div class="ko-sec">
    <div class="ko-ttl">${title} <span class="ko-dates">${dates}</span></div>
    ${matches.map(koMatchHTML).join('')}
  </div>`;
}

function renderKO() {
  const started = someGroupsStarted();
  const allDone = allGroupsFinished();

  let legend = '';
  if (!started) {
    legend = `<div class="ko-legend pending">
      ⏳ Las llaves se irán completando a medida que avance la fase de grupos.<br>
      Las llaves quedarán <strong>confirmadas</strong> una vez que terminen todos los partidos de la fase de grupos el <strong>27 de junio</strong>.
    </div>`;
  } else if (!allDone) {
    legend = `<div class="ko-legend inprogress">
      🔄 Las llaves se están actualizando en tiempo real según los resultados.<br>
      Quedarán <strong>confirmadas definitivamente</strong> al terminar toda la fase de grupos el <strong>27 de junio</strong>.
    </div>`;
  } else {
    legend = `<div class="ko-legend done">
      ✅ Fase de grupos finalizada — todas las llaves están <strong>confirmadas</strong>.
    </div>`;
  }

  const thirdsSummary = someGroupsStarted() ? buildThirdsSummary() : '';

  document.getElementById('koContainer').innerHTML =
    legend +
    thirdsSummary +
    koSection('16vos de Final', '28 Jun – 3 Jul', R32) +
    koSection('Octavos de Final', '4 – 7 Jul', R16) +
    koSection('Cuartos de Final', '9 – 11 Jul', QF) +
    koSection('Semifinales', '14 – 15 Jul', SF) +
    koSection('3er Puesto & Final', '18 – 19 Jul', FINALS) +
    '<div class="foot-note">Horarios en Argentina (UTC-3) · Fuente: ESPN</div>';
}

// ─────────────────────────────────────────────
// TAB SWITCH
// ─────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['fixture','grupos','llaves'][i]===id));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildFilters();
renderMatches();
renderGroups();
renderKO();
loadLiveData();

// Auto-refresh every 60 seconds
setInterval(loadLiveData, 60000);

// ─────────────────────────────────────────────
// PWA INSTALL PROMPT
// ─────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const b = document.createElement('div');
  b.id = 'installBanner';
  b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a24;border-top:1px solid #2a2a3a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,.5);';
  b.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <div style="background:#c8a84b;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏆</div>
      <div>
        <div style="font-weight:700;font-size:13px;color:#e8e8f0">Instalar Mundial 2026</div>
        <div style="font-size:11px;color:#6b6b85">Acceso rápido desde tu pantalla</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="dismissBanner()" style="background:transparent;border:1px solid #2a2a3a;color:#6b6b85;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Ahora no</button>
      <button onclick="installApp()" style="background:#c8a84b;border:none;color:#000;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
    </div>`;
  document.body.appendChild(b);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissBanner();
}

function dismissBanner() {
  const b = document.getElementById('installBanner');
  if (b) b.remove();
}

// iOS: hint si no está instalada y es Safari
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    if (document.getElementById('installBanner')) return;
    const h = document.createElement('div');
    h.id = 'installBanner';
    h.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a24;border-top:1px solid #2a2a3a;padding:14px 16px;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,.5);';
    h.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="background:#c8a84b;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px">🏆</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;color:#e8e8f0;margin-bottom:4px">Instalá en tu pantalla de inicio</div>
          <div style="font-size:12px;color:#6b6b85;line-height:1.5">Tocá <strong style="color:#c8a84b">Compartir ↑</strong> → <strong style="color:#c8a84b">"Agregar a pantalla de inicio"</strong></div>
        </div>
        <button onclick="dismissBanner()" style="background:transparent;border:none;color:#6b6b85;font-size:22px;cursor:pointer;padding:0;line-height:1">×</button>
      </div>`;
    document.body.appendChild(h);
  }, 3000);
}
</script>
