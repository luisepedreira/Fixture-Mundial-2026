<script>
// ─────────────────────────────────────────────
// TIMEZONE HELPER: ET (UTC-4 summer) → ARG (UTC-3)
// ARG = ET + 1 hour
// ─────────────────────────────────────────────
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTH_DAYS = {Jun:30,Jul:31};

function etToArg(etDateLabel, etH, etM) {
  // etDateLabel: e.g. "Jue 11 Jun"
  let argH = etH + 1;
  let [dn, dd, mon] = etDateLabel.split(' ');
  let dayNum = parseInt(dd);
  if (argH >= 24) {
    argH -= 24;
    dayNum++;
    if (dayNum > MONTH_DAYS[mon]) { dayNum = 1; mon = 'Jul'; }
    const di = DAYS_ES.indexOf(dn);
    dn = DAYS_ES[(di + 1) % 7];
  }
  const pad = n => n.toString().padStart(2,'0');
  return { time: `${pad(argH)}:${pad(etM)}`, date: `${dn} ${dayNum} ${mon}` };
}

// ─────────────────────────────────────────────
// FLAGS
// ─────────────────────────────────────────────
// ISO 3166-1 alpha-2 codes for FlagCDN
const FLAGS = {
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa',
  'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Germany':'de','Curacao':'cw','Ivory Coast':'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'USA':'us','Paraguay':'py','Australia':'au','Turkiye':'tr',
  'Canada':'ca','Bosnia':'ba','Qatar':'qa','Switzerland':'ch',
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
};
// Returns an <img> tag using FlagCDN — works on all platforms including Windows
const flag = (t, size=24) => {

let liveScores = {};       // "Home|Away" → {hs, as, status, clock, period}

let espnLoaded = false;

const ESPN_SCORE_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260611-20260719';
const ESPN_STAND_URL = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026';
const PROXY = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

const TEAM_MAP = {
  'United States':'USA','US':'USA','Türkiye':'Turkiye','Turkey':'Turkiye',
  "Côte d'Ivoire":'Ivory Coast',"Cote d'Ivoire":'Ivory Coast',
  'Curaçao':'Curacao','Bosnia and Herzegovina':'Bosnia','Bosnia & Herzegovina':'Bosnia',
  'Korea Republic':'South Korea','Republic of Korea':'South Korea',
  'Congo DR':'DR Congo','Democratic Republic of Congo':'DR Congo',
  'Cabo Verde':'Cape Verde',
};
const norm = name => TEAM_MAP[name] || name;

async function fetchJSON(url) {
  try {
    const r = await fetch(PROXY(url), {signal:AbortSignal.timeout(7000)});
    if (r.ok) return await r.json();
  } catch{}
  try {
    const r2 = await fetch(url, {signal:AbortSignal.timeout(5000)});
    if (r2.ok) return await r2.json();
  } catch{}
  return null;
}

async function loadLiveData() {
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('spin');
  document.getElementById('lastUpdate').textContent = 'Actualizando...';

  const [scoreData, standData] = await Promise.all([
    fetchJSON(ESPN_SCORE_URL),
    fetchJSON(ESPN_STAND_URL),
  ]);

  // Parse scores
  liveScores = {};
  let hasLive = false;
  if (scoreData && scoreData.events) {
    scoreData.events.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      if (!home || !away) return;
      const hn = norm(home.team?.displayName || home.team?.name || '');
      const an = norm(away.team?.displayName || away.team?.name || '');
      const status = ev.status?.type?.name || '';
      const clock = ev.status?.displayClock || '';
      const period = ev.status?.period || 0;
      const hs = home.score ?? '-';
      const as_ = away.score ?? '-';
      liveScores[`${hn}|${an}`] = { hs, as: as_, status, clock, period };
      if (status === 'STATUS_IN_PROGRESS') hasLive = true;
    });
  }

  // Parse standings
  standingsData = {};
  if (standData?.children) {
    standData.children.forEach(group => {
      const raw = group.name || group.abbreviation || '';
      const letter = raw.replace(/.*\s/,'').toUpperCase();
      if (!letter || !/^[A-L]$/.test(letter)) return;
      const entries = group.standings?.entries || [];
      standingsData[letter] = entries.map(e => {
        const s = {};
        (e.stats||[]).forEach(x => { s[x.abbreviation || x.name] = parseFloat(x.value)||0; });
        return {
          name: norm(e.team?.displayName || ''),
          pj: s.GP||s.gamesPlayed||0,
          pg: s.W||s.wins||0,
          pe: s.T||s.ties||0,
          pp: s.L||s.losses||0,
          gf: s.GF||0,
          gc: s.GA||0,
          dg: s.GD||s.pointDifferential||0,
          pts: s.PTS||s.points||0,
        };
      }).sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
    });
  }

  espnLoaded = true;
  document.getElementById('liveBadge').style.display = hasLive ? 'block' : 'none';
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Actualizado ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ESPN`;

  renderMatches();
  renderGroups();
  renderKO();
  icon.classList.remove('spin');
}

function getScore(hn, an) {
  return liveScores[`${hn}|${an}`] || null;
}

function statusLabel(sc) {
  if (!sc) return '';
  if (sc.status === 'STATUS_FINAL') return 'FT';
  if (sc.status === 'STATUS_HALFTIME') return 'ET';
  if (sc.status === 'STATUS_IN_PROGRESS') return sc.clock ? sc.clock+"'" : 'VIVO';
  return '';
}
function statusClass(sc) {
  if (!sc) return '';
  if (sc.status === 'STATUS_FINAL') return 'ft';
  if (sc.status === 'STATUS_IN_PROGRESS' || sc.status === 'STATUS_HALFTIME') return 'live';
  return '';
}

// GOOGLE CALENDAR LINK GENERATOR
// Uses Google Calendar URL API — no auth needed, opens pre-filled event
// Dates: 2026, ARG = UTC-3 → convert to UTC for gcal (add 3h)
// ─────────────────────────────────────────────
const MONTH_NUM = {Jun:'06', Jul:'07'};

function gcalLink(m) {
  // Parse ARG date/time → UTC datetime string for gcal
  // argDate: "Lun 22 Jun", argTime: "14:00"
  const [, dayNum, mon] = m.argDate.split(' ');
  const [argH, argM] = m.argTime.split(':').map(Number);

  // ARG = UTC-3, so UTC = ARG + 3
  let utcH = argH + 3;
  let utcDay = parseInt(dayNum);
  let utcMon = MONTH_NUM[mon];

  if (utcH >= 24) {
    utcH -= 24;
    utcDay++;
    // Simple overflow (won't cross month boundary given fixture dates)
  }

  const pad = n => n.toString().padStart(2,'0');
  const start = `2026${utcMon}${pad(utcDay)}T${pad(utcH)}${pad(argM)}00Z`;
  // Match duration: 2 hours
  let endH = utcH + 2;
  let endDay = utcDay;
  if (endH >= 24) { endH -= 24; endDay++; }
  const end = `2026${utcMon}${pad(endDay)}T${pad(endH)}${pad(argM)}00Z`;

  const title = encodeURIComponent(`⚽ ${m.h} vs ${m.a} — Mundial 2026`);
  const details = encodeURIComponent(`Fase de Grupos · Grupo ${m.g}\nEstadio: ${m.v}\nHorario Argentina: ${m.argTime} hs\n\nResultados en vivo: https://luisepedreira.github.io`);
  const location = encodeURIComponent(`${m.v}, Estados Unidos`);

  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${location}`;
}

  try { const d=JSON.parse(localStorage.getItem('gcal_token')); if(d&&d.expires>Date.now()) return d.access_token; } catch{}
  return null;
}
function clearToken() { localStorage.removeItem('gcal_token'); }
function saveKOEventIds(ids) { localStorage.setItem('gcal_ko_ids', JSON.stringify(ids)); }
function loadKOEventIds() { try{return JSON.parse(localStorage.getItem('gcal_ko_ids'))||[];}catch{return [];} }

// Date helper: ARG date+time -> UTC ISO string
function argToUTC(argDate, argTime) {
  const pad = n => n.toString().padStart(2,'0');
  const [, dayStr, mon] = argDate.split(' ');
  const [argH, argM] = argTime.split(':').map(Number);
  let utcH = argH+3, utcDay = parseInt(dayStr);
  const utcMon = {Jun:'06',Jul:'07'}[mon];
  if (utcH >= 24) { utcH -= 24; utcDay++; }
  return `2026-${utcMon}-${pad(utcDay)}T${pad(utcH)}:${pad(argM)}:00Z`;
}

function makeEvent(summary, location, description, argDate, argTime) {
  const start = argToUTC(argDate, argTime);
  // end = start + 2h
  const sd = new Date(start);
  sd.setHours(sd.getHours()+2);
  const end = sd.toISOString().replace('.000','');
  return {
    summary, location: location+', Estados Unidos', description,
    start:{dateTime:start,timeZone:'UTC'},
    end:{dateTime:end,timeZone:'UTC'},
    reminders:{useDefault:false,overrides:[{method:'popup',minutes:30}]},
  };
}

// OAuth via Google Identity Services
function requestOAuth() {
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) { reject(new Error('GIS no cargó')); return; }
    google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (r) => { if(r.error){reject(new Error(r.error));return;} saveToken(r); resolve(r.access_token); },
    }).requestAccessToken({prompt:''});
  });
}

async function getAccessToken() {
  const t = loadToken();
  if (t) return t;
  return await requestOAuth();
}

// Calendar API
async function calFetch(method, url, token, body) {
  const r = await fetch(url, {
    method, headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status===401) { clearToken(); throw new Error('token_expired'); }
  if (!r.ok && r.status!==204) throw new Error('HTTP '+r.status);
  return r.status===204 ? null : r.json();
}

let calRunning = false;

async function addAllToCalendar() {
  if (calRunning) return;
  calRunning = true;

  const koIds = loadKOEventIds();
  const isUpdate = koIds.length > 0;

  if (isUpdate && !allGroupsFinished()) {
    showToast('La fase de grupos no terminó. Las llaves se actualizan el 28 de junio.');
    calRunning = false; return;
  }

  const prog = showProgressModal(isUpdate ? 'Actualizando Llaves' : 'Agendando Mundial 2026');
  let token;
  try { token = await getAccessToken(); }
  catch(e) { prog.done('❌ No se pudo conectar con Google. Intentá de nuevo.', false); calRunning=false; return; }

  try {
    if (isUpdate) await doUpdateKO(token, koIds, prog);
    else await doCreateAll(token, prog);
  } catch(e) {
    prog.done('❌ Error: '+e.message, false);
  }
  calRunning = false;
}

async function doCreateAll(token, prog) {
  const allKO = [
    ...R32.map(m=>({m,s:'16vos de Final'})),
    ...R16.map(m=>({m,s:'Octavos de Final'})),
    ...QF.map(m=>({m,s:'Cuartos de Final'})),
    ...SF.map(m=>({m,s:'Semifinal'})),
    ...FINALS.map((m,i)=>({m,s:i===0?'3er Puesto':'Final'})),
  ];
  const total = MATCHES.length + allKO.length;
  let done = 0; const koIds = [];

  // Grupos
  for (const m of MATCHES) {
    const ev = makeEvent(
      `⚽ ${m.h} vs ${m.a} — Mundial 2026`,
      m.v,
      `Grupo ${m.g} · Fase de Grupos\nHorario Argentina: ${m.argTime} hs\n\n${FIXTURE_URL}`,
      m.argDate, m.argTime
    );
    try { await calFetch('POST', GCAL_API, token, ev); } catch(e) { if(e.message==='token_expired'){prog.done('❌ Sesión expirada. Intentá de nuevo.',false);return;} }
    done++;
    prog.upd(done, total, `Grupos: ${done}/${MATCHES.length}`);
    await new Promise(r=>setTimeout(r,110));
  }

  // Llaves
  for (const {m, s} of allKO) {
    const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
    const hR = resolveSlot(m.h), aR = resolveSlot(m.a);
    const hN = hR?hR.name:m.h, aN = aR?aR.name:m.a;
    const ev = makeEvent(
      `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
      m.v,
      `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
      date, time
    );
    try { const res = await calFetch('POST', GCAL_API, token, ev); koIds.push(res?.id||null); }
    catch { koIds.push(null); }
    done++;
    prog.upd(done, total, `Llaves: ${done-MATCHES.length}/${allKO.length}`);
    await new Promise(r=>setTimeout(r,110));
  }

  saveKOEventIds(koIds);
  requestNotifPermission();
  prog.done(`✅ <strong style="color:#e8e8f0">${total} eventos</strong> en tu Google Calendar.<br><span style="font-size:11px;color:#6b6b85;display:block;margin-top:4px">El 28 de junio te avisamos para actualizar las llaves.</span>`);
  updateCalBtnLabel();
}

async function doUpdateKO(token, koIds, prog) {
  const allKO = [
    ...R32.map(m=>({m,s:'16vos de Final'})),
    ...R16.map(m=>({m,s:'Octavos de Final'})),
    ...QF.map(m=>({m,s:'Cuartos de Final'})),
    ...SF.map(m=>({m,s:'Semifinal'})),
    ...FINALS.map((m,i)=>({m,s:i===0?'3er Puesto':'Final'})),
  ];
  let done = 0;
  for (let i=0; i<allKO.length; i++) {
    const {m,s} = allKO[i]; const id = koIds[i];
    if (!id) { done++; continue; }
    const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
    const hR = resolveSlot(m.h), aR = resolveSlot(m.a);
    const hN = hR?hR.name:m.h, aN = aR?aR.name:m.a;
    try {
      await calFetch('PATCH', `${GCAL_API}/${id}`, token, {
        summary: `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
        description: `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
      });
    } catch {}
    done++;
    prog.upd(done, allKO.length, `Actualizando: ${done}/${allKO.length}`);
    await new Promise(r=>setTimeout(r,110));
  }
  prog.done(`✅ <strong style="color:#e8e8f0">${allKO.length} llaves actualizadas</strong> en tu Google Calendar.`);
}

// ─────────────────────────────────────────────
// QUALIFIER CALCULATION
// ─────────────────────────────────────────────
const MATCHES_PER_GROUP = 6;

function getGroupStandings(letter) {
  const src = standingsData[letter];
  if (!src || !src.length)
    return GROUPS_STATIC[letter].map(name => ({name,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0}));
  return [...src].sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
}

function groupMatchesPlayed(letter) {
  const teams = GROUPS_STATIC[letter] || [];
  let count = 0;
  Object.entries(liveScores).forEach(([key, sc]) => {
    if (sc.status !== 'STATUS_FINAL') return;
    const [h, a] = key.split('|');
    if (teams.includes(h) && teams.includes(a)) count++;
  });
  return count;
}

function allGroupsFinished() {
  return Object.keys(GROUPS_STATIC).every(l => groupMatchesPlayed(l) >= MATCHES_PER_GROUP);
}
function someGroupsStarted() {
  return Object.keys(GROUPS_STATIC).some(l => groupMatchesPlayed(l) > 0);
}

// Returns {name, confirmed} or null
function getClassified(groupLetter, position) {
  const standings = getGroupStandings(groupLetter);
  const played = groupMatchesPlayed(groupLetter);
  const team = standings[position - 1];
  if (!team || team.pj === 0) return null;
  const confirmed = played >= MATCHES_PER_GROUP;
  return { name: team.name, confirmed };
}

// ─────────────────────────────────────────────
// BEST THIRDS — real-time ranking
// Returns array of up to 12 objects sorted by pts/DG/GF
// each: {name, group, pts, dg, gf, pj, confirmed}
// ─────────────────────────────────────────────
function getAllThirds() {
  const thirds = [];
  Object.keys(GROUPS_STATIC).forEach(letter => {
    const standings = getGroupStandings(letter);
    const played = groupMatchesPlayed(letter);
    const t = standings[2];
    if (t && t.pj > 0) {
      thirds.push({ ...t, group: letter, confirmed: played >= MATCHES_PER_GROUP });
    }
  });
  return thirds.sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
}

function getBestThirds() {
  return getAllThirds().slice(0, 8);
}

// ─────────────────────────────────────────────
// FIFA 2026 THIRD-PLACE BRACKET ASSIGNMENT
// The slot label in R32 lists which groups' thirds can fill it.
// Once all groups finish, we know the exact 8 best thirds and
// their source groups → we map each slot to the right team.
//
// Slot format: "3ro A/B/C/D/F" means: the best third from
// among groups A, B, C, D, F (whichever qualified) goes here.
// Since FIFA hasn't published the exact 2026 assignment table yet,
// we use the logical approach: parse the groups listed in the slot,
// intersect with the actual best-8 thirds' groups, pick the match.
// ─────────────────────────────────────────────
function resolveThirdSlot(slot) {
  // slot like "3ro A/B/C/D/F"
  const groupsInSlot = slot.replace('3ro ','').split('/');
  const best8 = getBestThirds();
  const best8groups = best8.map(t => t.group);

  // Teams in the best 8 whose group is listed in this slot
  const candidates = best8.filter(t => groupsInSlot.includes(t.group));

  if (candidates.length === 0) return null;

  // If all groups are finished we know for sure
  const allDone = allGroupsFinished();

  // Best candidate = first in sorted order (already sorted by pts/DG/GF)
  const best = candidates[0];

  // "Confirmed" only when all groups are done AND we have enough thirds
  return { name: best.name, confirmed: allDone && best8.length >= 8, provisional: !allDone };
}

// ─────────────────────────────────────────────
// RESOLVE ANY SLOT
// ─────────────────────────────────────────────
function resolveSlot(slot) {
  const m1 = slot.match(/^1ro Grupo ([A-L])$/);
  if (m1) return getClassified(m1[1], 1);
  const m2 = slot.match(/^2do Grupo ([A-L])$/);
  if (m2) return getClassified(m2[1], 2);
  if (slot.startsWith('3ro')) return resolveThirdSlot(slot);
  // KO stage winners/losers — not resolvable from group data
  if (slot.startsWith('Gan.') || slot.startsWith('Perd.')) return null;
  return null;
}

function koMatchHTML(m) {
  const {time, date} = etToArg(m.d, m.et[0], m.et[1]);

  const hResolved = m.hTeam ? {name: m.hTeam, confirmed: true} : resolveSlot(m.h);
  const aResolved = m.aTeam ? {name: m.aTeam, confirmed: true} : resolveSlot(m.a);

  const aName = aResolved ? aResolved.name : m.a;

  const aKnown = !!aResolved;

  const aConfirmed = aResolved?.confirmed;

  const aFlagHTML = aKnown ? flag(aResolved.name, 20) : '<span style="font-size:18px;opacity:.3">⬜</span>';

  // Score only if both teams are real known teams
  const sc = (hResolved && aResolved && m.hTeam && m.aTeam) ? getScore(hResolved.name, aResolved.name) : null;
  const hasScore = sc && sc.status !== 'STATUS_SCHEDULED';
  const isLive = sc && sc.status === 'STATUS_IN_PROGRESS';
  const sLabel = statusLabel(sc);
  const sClass = statusClass(sc);

  return `<div class="kocard${isLive?' live-card':''}">
    <div class="kotop">
      <div><div class="konum">${m.n}</div></div>
      <div class="kometaR">
        <div class="kotime${isLive?' live-time':''}">${isLive?'🔴 VIVO':time+' hs · '+date}</div>

        <div class="koflag">${hFlagHTML}</div>
        <div class="koname${!hKnown?' kodesc':''}${hKnown&&!hConfirmed?' provisional':''}"${hKnown?` ${teamClick(hResolved.name)}`:''}>${hName}</div>
      </div>
      <div class="kosbox">
        <div class="kosnum${hasScore?' scored':''}">${hasScore?sc.hs:'-'}</div>
        <div style="color:var(--muted);font-size:12px;margin:0 2px">:</div>
        <div class="kosnum${hasScore?' scored':''}">${hasScore?sc.as:'-'}</div>
      </div>
      <div class="koteam away">
        <div class="koflag">${aFlagHTML}</div>
        <div class="koname${!aKnown?' kodesc':''}${aKnown&&!aConfirmed?' provisional':''}" style="text-align:right"${aKnown?` ${teamClick(aResolved.name)}`:''}>${aName}</div>

}

async function fetchAFStats() {
  // Chequear caché localStorage (válido 23hs)
  try {
    const cached = localStorage.getItem('wc26_stats');
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < 23 * 3600 * 1000) {
        statsData = data;
        return data;
      }
    }
  } catch {}

  // Una sola llamada: top scorers (incluye asistencias y tarjetas por jugador)
  // API-Football /players/topscorers?league=1&season=2026
  try {
    const [scorersRes, cardsRes] = await Promise.all([
      fetch(`${AF_BASE}/players/topscorers?league=1&season=2026`, { headers: AF_HDR }),
      fetch(`${AF_BASE}/players/topyellowcards?league=1&season=2026`, { headers: AF_HDR }),
    ]);
    const [scorersData, cardsData] = await Promise.all([
      scorersRes.json(),
      cardsRes.json(),
    ]);

    const data = {
      scorers:  scorersData?.response  || [],
      ycards:   cardsData?.response    || [],
    };

    // Guardar en localStorage
    try {
      localStorage.setItem('wc26_stats', JSON.stringify({ ts: Date.now(), data }));
    } catch {}

    statsData = data;
    return data;
  } catch (e) {
    return null;
  }
}

function buildStatsView(data) {
  // Antes del 11 de junio siempre mostrar página pre-torneo
  if (!isTournamentStarted()) return buildPreTournamentView();

  if (!data) {
    return `<div class="stats-error">No se pudieron cargar los datos.<br>Revisá tu conexión o intentá más tarde.</div>`;
  }

  const scorers = data.scorers || [];
  const ycards  = data.ycards  || [];

  if (!scorers.length && !ycards.length) return buildPreTournamentView();

  // ── Goleadores top 10
  const scorerRows = scorers.slice(0, 10).map((p, i) => {
    const pl = p.player; const st = p.statistics?.[0];
    return `<div class="stats-row">
      <div class="stats-rank">${i+1}</div>
      <div class="stats-flag">${flagFor(st?.team?.name||'')}</div>
      <div class="stats-info">
        <div class="stats-name">${pl?.name||'—'}</div>
        <div class="stats-team">${st?.team?.name||''}</div>
      </div>
      <div class="stats-val">${st?.goals?.total||0}</div>
    </div>`;
  }).join('');

  // ── Asistencias top 10
  const assistRows = [...scorers]
    .sort((a,b)=>(b.statistics?.[0]?.goals?.assists||0)-(a.statistics?.[0]?.goals?.assists||0))
    .slice(0,10).map((p,i)=>{
      const pl=p.player; const st=p.statistics?.[0];
      const assists=st?.goals?.assists||0;
      if(!assists) return '';
      return `<div class="stats-row">
        <div class="stats-rank">${i+1}</div>
        <div class="stats-flag">${flagFor(st?.team?.name||'')}</div>
        <div class="stats-info">
          <div class="stats-name">${pl?.name||'—'}</div>
          <div class="stats-team">${st?.team?.name||''}</div>
        </div>
        <div class="stats-val">${assists}</div>
      </div>`;
    }).filter(Boolean).join('');

  // ── Tarjetas por país
  const countryCards = {};
  [...scorers,...ycards].forEach(p=>{
    const st=p.statistics?.[0]; const team=st?.team?.name;
    if(!team) return;
    if(!countryCards[team]) countryCards[team]={flag:flagFor(team),yellow:0,red:0};
    countryCards[team].yellow+=st?.cards?.yellow||0;
    countryCards[team].red+=(st?.cards?.red||0)+(st?.cards?.yellowred||0);
  });

  const countryRows = Object.entries(countryCards)
    .sort((a,b)=>(b[1].yellow+b[1].red*2)-(a[1].yellow+a[1].red*2))
    .map(([team,c])=>`
      <div class="stats-country-row" onclick="openCountryDetail('${team.replace(/'/g,"\\'")}')">
        <div class="stats-flag">${c.flag}</div>
        <div class="stats-country-name">${team}</div>
        <div class="stats-country-vals">
          <span class="stats-badge yellow">🟨</span><span class="stats-badge-count">${c.yellow}</span>
          <span class="stats-badge red">🟥</span><span class="stats-badge-count">${c.red}</span>
          <span style="color:var(--muted);font-size:12px">›</span>
        </div>
      </div>`).join('');

  const now = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  return `
    <div class="stats-hdr">
      <div class="stats-ttl">Datos</div>
      <div class="stats-upd">Actualizado ${now}</div>
    </div>
    <div class="stats-section">
      <div class="stats-section-hdr">⚽ Goleadores</div>
      ${scorerRows||'<div class="stats-empty">Sin datos aún</div>'}
    </div>
    <div class="stats-section">
      <div class="stats-section-hdr">🎯 Asistencias</div>
      ${assistRows||'<div class="stats-empty">Sin datos aún</div>'}
    </div>
    <div class="stats-section">
      <div class="stats-section-hdr">🟨 Tarjetas por país</div>
      ${countryRows||'<div class="stats-empty">Sin datos aún</div>'}
    </div>`;
}

async function openCountryDetail(teamName) {
  const started = isTournamentStarted();

  // Mostrar modal con loading si hace falta cargar datos por primera vez
  if (started && !statsData) {
    document.body.insertAdjacentHTML('beforeend', `
      <div class="country-modal" id="countryModal">
        <div class="country-sheet">
          <div class="country-sheet-hdr">
            <div class="country-sheet-flag">${flag(teamName, 28)}</div>
          <div class="stats-loading">Cargando datos...</div>
        </div>
      </div>`);
    await fetchAFStats();
    closeCountryDetail();
  }

  // Datos del torneo (null si no empezó)
  const data = started ? statsData : null;
  const players = data ? (data.scorers||[]).filter(p=>p.statistics?.[0]?.team?.name===teamName) : [];

  const goles = players.filter(p=>p.statistics[0]?.goals?.total>0)
    .sort((a,b)=>(b.statistics[0]?.goals?.total||0)-(a.statistics[0]?.goals?.total||0));
  const asists = players.filter(p=>p.statistics[0]?.goals?.assists>0)
    .sort((a,b)=>(b.statistics[0]?.goals?.assists||0)-(a.statistics[0]?.goals?.assists||0));
  const amarillas = players.filter(p=>p.statistics[0]?.cards?.yellow>0)
    .sort((a,b)=>(b.statistics[0]?.cards?.yellow||0)-(a.statistics[0]?.cards?.yellow||0));
  const rojas = players
    .filter(p=>(p.statistics[0]?.cards?.red||0)+(p.statistics[0]?.cards?.yellowred||0)>0)
    .sort((a,b)=>((b.statistics[0]?.cards?.red||0)+(b.statistics[0]?.cards?.yellowred||0))-
                  ((a.statistics[0]?.cards?.red||0)+(a.statistics[0]?.cards?.yellowred||0)));

  const playerRow = (p, val) => `<div class="stats-row">
    <div class="stats-info"><div class="stats-name">${p.player?.name||'—'}</div></div>
    <div class="stats-val">${val}</div>
  </div>`;

  const section = (icon, title, rows, empty) => `
    <div class="stats-section" style="margin:12px 12px 0">
      <div class="stats-section-hdr">${icon} ${title}</div>
      ${rows.length ? rows.join('') : `<div class="stats-empty">${empty}</div>`}
    </div>`;

  const photoBlock = `
    <div style="text-align:center;padding:20px 12px 12px;">
      ${flag(teamName, 96)}
    </div>`;

  const preMsg = !started ? `
    <div style="margin:12px;background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.2);border-radius:10px;padding:12px;text-align:center;font-size:12px;color:var(--muted)">
      Los datos individuales estarán disponibles desde el 11 de junio.
    </div>` : '';

  const html = `
    <div class="country-modal" id="countryModal" onclick="if(event.target.id==='countryModal')closeCountryDetail()">
      <div class="country-sheet">
        <div class="country-sheet-hdr">
          <div class="country-sheet-flag">${flag(teamName, 28)}</div>
          <div class="country-sheet-name">${teamName}</div>
          <div class="country-sheet-close" onclick="closeCountryDetail()">✕</div>
        </div>
        ${photoBlock}
        ${preMsg}
        ${section('⚽','Goles', goles.map(p=>playerRow(p,p.statistics[0]?.goals?.total)), started?'Sin goles aún':'—')}
        ${section('🎯','Asistencias', asists.map(p=>playerRow(p,p.statistics[0]?.goals?.assists)), started?'Sin asistencias aún':'—')}
        ${section('🟨','Tarjetas amarillas', amarillas.map(p=>playerRow(p,p.statistics[0]?.cards?.yellow)), started?'Sin tarjetas aún':'—')}
        ${section('🟥','Tarjetas rojas', rojas.map(p=>playerRow(p,(p.statistics[0]?.cards?.red||0)+(p.statistics[0]?.cards?.yellowred||0))), started?'Sin tarjetas aún':'—')}
        <div style="height:20px"></div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}
