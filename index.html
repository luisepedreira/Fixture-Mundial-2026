<style>
:root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;--accent:#c8a84b;--arg:#74b2e0;--text:#e8e8f0;--muted:#6b6b85;--green:#22c55e;--red:#ef4444;--yellow:#eab308;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
/* HEADER */
.header{background:linear-gradient(135deg,#0a0a0f 0%,#161620 100%);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.live-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:1px;animation:pulse 1.5s infinite;}
.bulk-cal-btn{background:rgba(66,133,244,.12);border:1px solid rgba(66,133,244,.3);color:#4a90d9;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.bulk-cal-btn:active{background:rgba(66,133,244,.25);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-top:4px;}
.tab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;user-select:none;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* CONTENT */
.content{padding:12px;}
.pane{display:none;}
.pane.active{display:block;}
/* FILTERS */
.sticky-filters{position:sticky;top:var(--header-h,0px);z-index:90;background:var(--bg);display:flex;flex-direction:column;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* DAY */
.day-group{margin-bottom:10px;}
.day-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 4px 5px;display:flex;align-items:center;gap:8px;}
.date-jump{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:10px;-webkit-appearance:none;appearance:none;}
.day-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
/* MATCH CARD */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:5px;position:relative;}
.mcard.arg{border-left:3px solid var(--arg);}
.mcard.live-card{border-color:var(--red);}
.mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mmeta-l{}
.mgrp{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.arg-lbl{display:inline-block;background:rgba(116,178,224,.15);color:var(--arg);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:10px;text-transform:uppercase;margin-top:3px;}
.mmeta-r{text-align:right;}
.mtime{font-size:12px;color:var(--accent);font-weight:700;}
.mtime.live-time{color:var(--red);}
.mvenue{font-size:10px;color:var(--muted);margin-top:1px;}
.mnote{font-size:9px;color:var(--muted);margin-top:2px;font-style:italic;}
.mteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.mteam{display:flex;flex-direction:column;gap:4px;}
.mteam.home{align-items:flex-start;}
.mteam.away{align-items:flex-end;}
.mflag{line-height:1;width:32px;height:24px;display:flex;align-items:center;}
.mname{font-size:12px;font-weight:700;color:var(--text);}
.mteam.away .mname{text-align:right;}
[onclick^="openCountryDetail"]{cursor:pointer;}
.sbox{display:flex;flex-direction:column;align-items:center;gap:3px;}
.snums{display:flex;gap:4px;align-items:center;}
.snum{background:var(--surface);border:1px solid var(--border);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);border-radius:6px;}
.snum.scored{background:rgba(200,168,75,.12);border-color:var(--accent);color:var(--accent);}
.ssep{color:var(--muted);font-size:14px;font-weight:700;}
.sstatus{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.sstatus.ft{color:var(--muted);}
.sstatus.live{color:var(--red);}
.sstatus.ht{color:var(--yellow);}
/* GROUPS */
.groups-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.groups-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.rbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.lupd{font-size:10px;color:var(--muted);text-align:center;margin-bottom:12px;}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:400px){.ggrid{grid-template-columns:1fr;}}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.gtitle{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--accent);}
.gtbl{width:100%;border-collapse:collapse;}
.gtbl th{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding:4px 2px;text-align:center;white-space:nowrap;}
.gtbl th:first-child{text-align:left;padding-left:8px;}
.gtbl td{padding:4px 2px;text-align:center;font-size:10px;font-weight:600;border-top:1px solid var(--border);white-space:nowrap;}
.gtbl td:first-child{text-align:left;padding-left:8px;white-space:normal;}
.trow{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;}
.trow .fl{width:15px;height:12px;display:flex;align-items:center;flex-shrink:0;}
.trow span:last-child{overflow:hidden;text-overflow:ellipsis;}
.pts{color:var(--accent);font-weight:700;}
.gtbl tbody tr:nth-child(1) td,.gtbl tbody tr:nth-child(2) td{background:rgba(34,197,94,.04);}
.gtbl tbody tr:nth-child(1) td:first-child,.gtbl tbody tr:nth-child(2) td:first-child{border-left:3px solid rgba(34,197,94,.5);}
.argrow td{background:rgba(116,178,224,.08)!important;}
.argrow td:first-child{border-left:3px solid var(--arg)!important;}
/* BRACKET TREE */
.bracket-wrap{overflow-x:auto;padding-bottom:16px;-webkit-overflow-scrolling:touch;}
.bracket-wrap::-webkit-scrollbar{height:4px;}
.bracket-wrap::-webkit-scrollbar-track{background:var(--surface);}
.bracket-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bracket-tree{display:flex;gap:0;min-width:960px;align-items:stretch;}
.round-col{display:flex;flex-direction:column;flex:1;min-width:120px;}
.round-hdr{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--accent);letter-spacing:1px;text-align:center;padding:7px 4px;border-bottom:1px solid var(--border);margin-bottom:6px;white-space:nowrap;}
.round-hdr span{font-family:'Inter',sans-serif;font-size:8px;color:var(--muted);font-weight:600;display:block;margin-top:1px;letter-spacing:0;}
.matches-col{display:flex;flex-direction:column;flex:1;justify-content:space-around;}
.bslot{display:flex;flex-direction:column;flex:1;justify-content:center;}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:7px;margin:3px 4px;overflow:hidden;}
.bcard.final-card{border-color:var(--accent);box-shadow:0 0 10px rgba(200,168,75,.18);}
.bcard.sf-card{border-color:rgba(200,168,75,.35);}
.bcard.live-card{border-color:var(--red);}
.bteam{display:flex;align-items:center;gap:5px;padding:5px 6px;border-bottom:1px solid var(--border);}
.bteam:last-child{border-bottom:none;}
.bteam.winner{background:rgba(200,168,75,.07);}
.bteam.live-winner{background:rgba(239,68,68,.06);}
.bflag{width:16px;height:12px;flex-shrink:0;display:flex;align-items:center;}
.bflag img{width:16px;height:12px;border-radius:2px;object-fit:cover;}
.bname{font-size:9.5px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bname.tbd{color:var(--muted);font-weight:500;font-style:italic;font-size:8.5px;}
.bname.provisional{color:var(--yellow)!important;font-style:italic;}
.bscore{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--accent);min-width:10px;text-align:right;flex-shrink:0;}
.bmatch-label{font-size:7.5px;color:var(--muted);text-align:center;padding:2px 0 1px;font-weight:600;letter-spacing:.4px;background:var(--surface);border-bottom:1px solid var(--border);}
.connector-col{width:14px;display:flex;flex-direction:column;flex-shrink:0;}
.connector-svg{width:14px;height:100%;display:block;}
.trophy-box{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.25);border-radius:8px;padding:8px 4px;text-align:center;margin:3px 4px 4px;}
.trophy-icon{font-size:22px;display:block;margin-bottom:2px;}
.trophy-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--accent);letter-spacing:1px;}
.trophy-date{font-size:7.5px;color:var(--muted);font-weight:600;margin-top:1px;}
.third-box{margin:4px 4px 0;padding:5px 6px;background:rgba(200,168,75,.03);border:1px solid rgba(200,168,75,.12);border-radius:7px;}
.third-lbl{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:.4px;margin-bottom:3px;text-align:center;}
.bracket-note{text-align:center;color:var(--muted);font-size:10px;padding:8px 0 20px;}
.bmeta{font-size:7.5px;color:var(--muted);text-align:center;padding:3px 4px 4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bmeta.live-meta{color:var(--red);}
/* keep scroll-width=0 only on Y axis for bracket */
.bracket-wrap{scrollbar-width:thin;scrollbar-color:var(--border) var(--surface);}
body::-webkit-scrollbar{width:0;}
.empty{text-align:center;color:var(--muted);padding:30px 20px;font-size:13px;}
.foot-note{text-align:center;color:var(--muted);font-size:10px;padding:16px 0 24px;}
/* Google Calendar button */
.gcal-row{margin-top:10px;border-top:1px solid var(--border);padding-top:8px;}
.gcal-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.25);color:#4a90d9;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;transition:all .15s;}
.gcal-btn:active{background:rgba(66,133,244,.2);}
/* KO Legend */
.ko-legend{border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;line-height:1.6;border:1px solid;}
.ko-legend.pending{background:rgba(234,179,8,.05);border-color:rgba(234,179,8,.2);color:#a89030;}
.ko-legend.inprogress{background:rgba(59,130,246,.05);border-color:rgba(59,130,246,.2);color:#7ab0e0;}
.ko-legend.done{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2);color:#4ade80;}
.ko-legend strong{font-weight:700;color:inherit;}
/* Provisional team name (leading but not confirmed) */
.provisional{color:var(--yellow)!important;font-style:italic;}
/* ── STATS ── */
.stats-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.stats-ttl{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;text-transform:uppercase;}
.stats-upd{font-size:10px;color:var(--muted);}
.stats-section{margin:0 16px 12px;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.stats-section-hdr{background:var(--surface);padding:8px 12px;font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px;}
.stats-row{display:flex;align-items:center;padding:9px 14px;border-top:1px solid var(--border);gap:10px;transition:background .15s;}
.stats-row:first-of-type{border-top:none;}
.stats-rank{width:18px;font-size:11px;color:var(--muted);text-align:center;font-weight:600;flex-shrink:0;}
.stats-flag{font-size:18px;flex-shrink:0;}
.stats-info{flex:1;min-width:0;}
.stats-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stats-team{font-size:11px;color:var(--muted);}
.stats-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:24px;text-align:right;}
.stats-country-row{display:flex;align-items:center;padding:7px 12px;border-top:1px solid var(--border);gap:8px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.stats-country-row:first-of-type{border-top:none;}
.stats-country-row:active{background:rgba(255,255,255,.04);}
.stats-country-name{flex:1;font-size:12px;font-weight:600;color:var(--text);}
.stats-country-vals{display:flex;gap:8px;align-items:center;}
.stats-badge{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;font-size:11px;font-weight:700;}
.stats-badge.yellow{background:rgba(234,179,8,.15);color:#f0c040;}
.stats-badge.red{background:rgba(239,68,68,.15);color:#f87171;}
.stats-badge-count{font-size:11px;font-weight:700;color:var(--muted);min-width:14px;text-align:center;}
.ver-mas-btn{text-align:center;padding:8px;font-size:10.5px;font-weight:700;color:var(--accent);cursor:pointer;border-top:1px solid var(--border);background:var(--surface);-webkit-tap-highlight-color:transparent;}
.ver-mas-btn:active{opacity:.7;}
/* Country detail modal */
.country-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:8000;display:flex;align-items:flex-end;justify-content:center;}
.country-sheet{background:var(--bg);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:0 0 32px;max-height:85vh;overflow-y:auto;}
.country-sheet-hdr{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.country-sheet-flag{font-size:32px;}
.country-sheet-name{flex:1;font-size:16px;font-weight:700;color:var(--text);}
.country-sheet-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--surface);border-radius:50%;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;}
.stats-empty{text-align:center;color:var(--muted);padding:20px;font-size:12px;}
.stats-loading{text-align:center;color:var(--muted);padding:40px 20px;font-size:13px;}
.stats-error{text-align:center;color:#f87171;padding:20px;font-size:12px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏆</div>
      <div>
        <div class="logo-text">Mundial 2026</div>
        <div class="logo-sub">11 Jun – 19 Jul · USA · CAN · MEX</div>
      </div>
    </div>
    <div class="live-badge" id="liveBadge" style="display:none">EN VIVO</div>
    <a id="subBtn" href="https://calendar.google.com/calendar/r?cid=c632e500cff2a9751a2ba200de5e96312eec4705c751ab8c355252c4b6edc2fe%40group.calendar.google.com" target="_blank" class="bulk-cal-btn" title="Suscribirse al calendario del Mundial">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="15" x2="12" y2="19"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
      + Calendario
    </a>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('fixture')">Fixture</div>
    <div class="tab" onclick="switchTab('grupos')">Grupos</div>
    <div class="tab" onclick="switchTab('terceros')">Terceros</div>
    <div class="tab" onclick="switchTab('llaves')">Llaves</div>
    <div class="tab" onclick="switchTab('datos')">Datos</div>
  </div>
</div>

<div class="content">
  <div class="pane active" id="pane-fixture">
    <div class="sticky-filters" id="fixtureSticky">
      <div class="filter-row" id="filterRow"></div>
      <select class="date-jump" id="dateJump" onchange="jumpToDate(this.value)">
        <option value="">📅 Ir a fecha…</option>
      </select>
    </div>

const MONTH_DAYS = {Jun:30,Jul:31};

function etToArg(etDateLabel, etH, etM) {
  // etDateLabel: e.g. "Jue 11 Jun"
  let argH = etH + 1;
  let [dn, dd, mon] = etDateLabel.split(' ');
  let dayNum = parseInt(dd);
  if (argH >= 24) {
    argH -= 24;
    dayNum++;
    if (dayNum > MONTH_DAYS[mon]) { dayNum = 1; mon = 'Jul'; }
    const di = DAYS_ES.indexOf(dn);
    dn = DAYS_ES[(di + 1) % 7];
  }
  const pad = n => n.toString().padStart(2,'0');
  return { time: `${pad(argH)}:${pad(etM)}`, date: `${dn} ${dayNum} ${mon}` };
}

// Busca score por nombre (con fallback por fecha/hora si el nombre no matchea)
function getScore(hn, an) {
  const h = norm(hn);
  const a = norm(an);
  // Plan A: match por nombre normalizado
  const byName = liveScores[`${h}|${a}`] || liveScores[`${hn}|${an}`] || null;
  if (byName) return byName;
  // Plan B: match por fecha+hora del partido en el fixture
  const m = MATCHES.find(x => x.h === hn && x.a === an);
  if (!m) return null;
  // Calcular UTC desde ET: ET = UTC-4 (verano), por lo que UTC = ET + 4h
  // El label del fixture tiene formato "Día DD Mon", ej "Vie 12 Jun"
  const parts = m.d.split(' '); // ["Vie","12","Jun"]
  const day = parseInt(parts[1]);
  const month = parts[2] === 'Jun' ? 5 : 6; // 0-indexed
  const etH = m.et[0], etM = m.et[1];
  const utcH = etH + 4; // ET → UTC
  const utcDate = new Date(Date.UTC(2026, month, day, utcH, etM));
  const isoKey = utcDate.toISOString().slice(0,16); // "2026-06-12T19:00"
  // Buscamos en el índice por fecha UTC con ventana de ±90 min
  for (const [key, val] of Object.entries(liveScoresByDate)) {
    const diff = Math.abs(new Date(key).getTime() - utcDate.getTime());
    if (diff < 90 * 60 * 1000) return val;
  }
  return null;
}

async function fetchJSON(url) {
  // ESPN responde CORS directo (~200ms) — probamos eso primero.
  // El proxy allorigins queda solo como fallback (puede tardar varios segundos
  // o fallar por rate-limit) para redes donde el fetch directo no funcione.
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(5000)});
    if (r.ok) return await r.json();
  } catch{}
  try {
    const r2 = await fetch(PROXY(url), {signal:AbortSignal.timeout(8000)});
    if (r2.ok) return await r2.json();
  } catch{}
  return null;
}

async function loadLiveData() {

  const [scoreData, standData] = await Promise.all([

    scoreData.events.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      if (!home || !away) return;
      const hn = norm(home.team?.displayName || home.team?.name || '');
      const an = norm(away.team?.displayName || away.team?.name || '');
      const status = ev.status?.type?.name || '';
      const clock = ev.status?.displayClock || '';
      const period = ev.status?.period || 0;
      const hs = home.score ?? '-';
      const as_ = away.score ?? '-';
      const scoreObj = { hs, as: as_, status, clock, period };
      // Plan A: índice por nombre
      liveScores[`${hn}|${an}`] = scoreObj;
      // Plan B: índice por fecha/hora UTC del partido (ej: "2026-06-12T19:00:00Z")
      const dateStr = comp.startDate || ev.date || '';
      if (dateStr) {
        // Normalizamos a ISO sin milisegundos
        const isoKey = new Date(dateStr).toISOString().slice(0,16); // "2026-06-12T19:00"
        liveScoresByDate[isoKey] = scoreObj;
      }
      if (status === 'STATUS_IN_PROGRESS') hasLive = true;
    });
  }
  parseCards(scoreData); // recalcula con cache al instante; fetch de nuevos partidos corre en background

  // Parse standings — probar varias estructuras posibles de ESPN
  standingsData = {};
  let standDebug = 'sin respuesta';
  const groupsArr = standData?.children || standData?.standings?.children || standData?.groups || null;
  if (Array.isArray(groupsArr)) {
    standDebug = `${groupsArr.length} grupos en respuesta`;
    groupsArr.forEach(group => {
      const raw = group.name || group.abbreviation || group.displayName || '';
      const letter = raw.replace(/.*\s/,'').toUpperCase();
      if (!letter || !/^[A-L]$/.test(letter)) return;
      const entries = group.standings?.entries || group.entries || [];
      standingsData[letter] = entries.map(e => {
        const s = {};
        (e.stats||[]).forEach(x => {
          const key = (x.abbreviation || x.name || '').toUpperCase();
          if (key) s[key] = parseFloat(x.value)||0;
        });
        const pg = s.W||0;
        const pe = s.D||s.T||s.TIES||0;
        return {
          name: norm(e.team?.displayName || ''),
          pj: s.GP||0,
          pg,
          pe,
          pp: s.L||0,
          gf: s.GF||s.F||0,
          gc: s.GA||s.A||0,
          dg: s.GD||s.DIFF||0,
          pts: pg*3 + pe,
        };
      }).sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
    });
    standDebug += ` → ${Object.keys(standingsData).length} parseados`;
  } else if (standData) {
    standDebug = `respuesta sin children/groups (claves: ${Object.keys(standData).join(',')})`;
  }

  espnLoaded = true;
  document.getElementById('liveBadge').style.display = hasLive ? 'block' : 'none';
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Actualizado ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ESPN · ${standDebug}`;

  renderMatches();
  renderGroups();
  renderTerceros();
  renderKO();
  renderDatos();
  if (!initialFixtureScrollDone) {
    initialFixtureScrollDone = true;
    if (!userScrolledFixture) scrollToCurrentDay();
  }
  icon.classList.remove('spin');

  // Auto-sync silencioso: actualiza Calendar si algún slot de llaves se confirmó
  autoSyncKOCalendar();
}

// dayKey: clave numérica comparable a partir de un label "Lun 22 Jun" → mes*100+día
function dayKeyFromLabel(label) {
  const parts = label.split(' ');
  const dd = parseInt(parts[1], 10);
  const mon = parts[2];
  return ({Jun:6,Jul:7}[mon] || 0) * 100 + dd;
}
// Fecha "civil" actual en Argentina (UTC-3, sin horario de verano) como dayKey
function argTodayKey() {
  const d = new Date(Date.now() - 3 * 3600000);
  return (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
}
// Scrollea hasta un day-group compensando el header sticky y, si corresponde,
// un bloque sticky adicional (filtros/date-jump) que también ocupa espacio fijo arriba.
function scrollToDayGroup(target, smooth, stickyId) {
  if (!target) return;
  const headerEl = document.querySelector('.header');
  const headerH = headerEl ? headerEl.offsetHeight : 0;
  const stickyEl = stickyId ? document.getElementById(stickyId) : null;
  const stickyH = stickyEl ? stickyEl.offsetHeight : 0;
  const y = target.getBoundingClientRect().top + window.scrollY - headerH - stickyH - 8;
  window.scrollTo({ top: Math.max(y, 0), behavior: smooth ? 'smooth' : 'auto' });
}

// GOOGLE CALENDAR LINK GENERATOR
// Uses Google Calendar URL API — no auth needed, opens pre-filled event
// Dates: 2026, ARG = UTC-3 → convert to UTC for gcal (add 3h)
// ─────────────────────────────────────────────
const MONTH_NUM = {Jun:'06', Jul:'07'};

function gcalLink(m) {
  // Parse ARG date/time → UTC datetime string for gcal
  // argDate: "Lun 22 Jun", argTime: "14:00"
  const [, dayNum, mon] = m.argDate.split(' ');
  const [argH, argM] = m.argTime.split(':').map(Number);

  // ARG = UTC-3, so UTC = ARG + 3
  let utcH = argH + 3;
  let utcDay = parseInt(dayNum);
  let utcMon = MONTH_NUM[mon];

  if (utcH >= 24) {
    utcH -= 24;
    utcDay++;
    // Simple overflow (won't cross month boundary given fixture dates)
  }

  const pad = n => n.toString().padStart(2,'0');
  const start = `2026${utcMon}${pad(utcDay)}T${pad(utcH)}${pad(argM)}00Z`;
  // Match duration: 2 hours
  let endH = utcH + 2;
  let endDay = utcDay;
  if (endH >= 24) { endH -= 24; endDay++; }
  const end = `2026${utcMon}${pad(endDay)}T${pad(endH)}${pad(argM)}00Z`;

  const title = encodeURIComponent(`⚽ ${es(m.h)} vs ${es(m.a)} — Mundial 2026`);
  const details = encodeURIComponent(`Fase de Grupos · Grupo ${m.g}\nEstadio: ${m.v}\nHorario Argentina: ${m.argTime} hs\n\nResultados en vivo: https://luisepedreira.github.io`);
  const location = encodeURIComponent(`${m.v}, Estados Unidos`);

  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${location}`;
}

// Date helper: ARG date+time -> UTC ISO string
function argToUTC(argDate, argTime) {
  const pad = n => n.toString().padStart(2,'0');
  const [, dayStr, mon] = argDate.split(' ');
  const [argH, argM] = argTime.split(':').map(Number);
  let utcH = argH + 3;
  let utcDay = parseInt(dayStr);
  let utcMon = mon; // 'Jun' o 'Jul'
  if (utcH >= 24) { utcH -= 24; utcDay++; }
  // Manejo de desbordamiento de mes (Jun tiene 30 días)
  if (utcMon === 'Jun' && utcDay > 30) { utcDay -= 30; utcMon = 'Jul'; }
  if (utcMon === 'Jul' && utcDay > 31) { utcDay -= 31; utcMon = 'Ago'; } // por si acaso
  const monNum = {Jun:'06', Jul:'07', Ago:'08'}[utcMon] || '07';
  return `2026-${monNum}-${pad(utcDay)}T${pad(utcH)}:${pad(argM)}:00Z`;
}

function makeEvent(summary, location, description, argDate, argTime) {
  const start = argToUTC(argDate, argTime);
  // end = start + 2h
  const sd = new Date(start);
  sd.setHours(sd.getHours()+2);
  const end = sd.toISOString().replace('.000','');
  return {
    summary, location: location+', Estados Unidos', description,
    start:{dateTime:start,timeZone:'UTC'},
    end:{dateTime:end,timeZone:'UTC'},
    reminders:{useDefault:false,overrides:[{method:'popup',minutes:30}]},
  };
}

// OAuth via Google Identity Services
function requestOAuth() {
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) { reject(new Error('GIS no cargó')); return; }
    google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPE,
      callback: (r) => { if(r.error){reject(new Error(r.error));return;} saveToken(r); resolve(r.access_token); },
    }).requestAccessToken({prompt:''});
  });
}

async function getAccessToken() {
  const t = loadToken();
  if (t) return t;
  return await requestOAuth();
}

// Calendar API
async function calFetch(method, url, token, body) {
  const r = await fetch(url, {
    method, headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status===401) { clearToken(); throw new Error('token_expired'); }
  if (!r.ok && r.status!==204) throw new Error('HTTP '+r.status);
  return r.status===204 ? null : r.json();
}

    const hR = resolveSlotFull(m.h);
    const aR = resolveSlotFull(m.a);
    const hN = (hR && hR.confirmed) ? es(hR.name) : slotLabel(m.h);
    const aN = (aR && aR.confirmed) ? es(aR.name) : slotLabel(m.a);

    const ev = makeEvent(
      `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
      m.v,
      `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
      date, time
    );
    try {
      const res = await calFetch('POST', GCAL_API, token, ev);
      const id = res?.id || null;
      koIds.push(id);
      if (id) koMap[m.n] = id;
    } catch { koIds.push(null); }
    prog.upd(allEvents.length + i + 1, allEvents.length + allKO.length, `Creando: ${i+1}/${allKO.length}`);
    await new Promise(r => setTimeout(r, 110));
  }

  saveKOEventIds(koIds);
  saveKOEventMap(koMap);
  saveKOSnap(snapshotKOState());
  localStorage.setItem('gcal_ko_snap_v3', '1');

  const banner = document.getElementById('calStaleBanner');
  if (banner) banner.style.display = 'none';

  calRunning = false;
  prog.done(`✅ <strong style="color:#e8e8f0">${allKO.length} eventos</strong> recreados correctamente en tu Calendar.`);
}

async function doCreateAll(token, prog) {
  const allKO = [
    ...R32.map(m=>({m,s:'16vos de Final'})),
    ...R16.map(m=>({m,s:'Octavos de Final'})),
    ...QF.map(m=>({m,s:'Cuartos de Final'})),
    ...SF.map(m=>({m,s:'Semifinal'})),
    ...FINALS.map((m,i)=>({m,s:i===0?'3er Puesto':'Final'})),
  ];
  const total = MATCHES.length + allKO.length;
  let done = 0;

  // Grupos
  for (const m of MATCHES) {
    const ev = makeEvent(
      `⚽ ${es(m.h)} vs ${es(m.a)} — Mundial 2026`,
      m.v,
      `Grupo ${m.g} · Fase de Grupos\nHorario Argentina: ${m.argTime} hs\n\n${FIXTURE_URL}`,
      m.argDate, m.argTime
    );
    try { await calFetch('POST', GCAL_API, token, ev); } catch(e) { if(e.message==='token_expired'){prog.done('❌ Sesión expirada. Intentá de nuevo.',false);return;} }
    done++;
    prog.upd(done, total, `Grupos: ${done}/${MATCHES.length}`);
    await new Promise(r=>setTimeout(r,110));
  }

  // Llaves
  const koIds = []; const koMap = {};
  for (const {m, s} of allKO) {
    const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
    const hR = resolveSlot(m.h), aR = resolveSlot(m.a);
    const hN = hR?es(hR.name):m.h, aN = aR?es(aR.name):m.a;
    const ev = makeEvent(
      `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
      m.v,
      `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
      date, time
    );
    try {
      const res = await calFetch('POST', GCAL_API, token, ev);
      const id = res?.id || null;
      koIds.push(id);
      if (id) koMap[m.n] = id;
    }
    catch { koIds.push(null); }
    done++;
    prog.upd(done, total, `Llaves: ${done-MATCHES.length}/${allKO.length}`);
    await new Promise(r=>setTimeout(r,110));
  }

  saveKOEventIds(koIds);
  saveKOEventMap(koMap);
  // Guardar snapshot para que el auto-sync compare desde aquí en adelante
  saveKOSnap(snapshotKOState());
  requestNotifPermission();
  prog.done(`✅ <strong style="color:#e8e8f0">${total} eventos</strong> en tu Google Calendar.<br><span style="font-size:11px;color:#6b6b85;display:block;margin-top:4px">El 28 de junio te avisamos para actualizar las llaves.</span>`);
  updateCalBtnLabel();
}

async function doUpdateKO(token, koIds, prog) {
  const allKO = [
    ...R32.map(m=>({m,s:'16vos de Final'})),
    ...R16.map(m=>({m,s:'Octavos de Final'})),
    ...QF.map(m=>({m,s:'Cuartos de Final'})),
    ...SF.map(m=>({m,s:'Semifinal'})),
    ...FINALS.map((m,i)=>({m,s:i===0?'3er Puesto':'Final'})),
  ];
  let done = 0;
  for (let i=0; i<allKO.length; i++) {
    const {m,s} = allKO[i]; const id = koIds[i];
    if (!id) { done++; continue; }
    const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
    const hR = resolveSlot(m.h), aR = resolveSlot(m.a);
    const hN = hR?hR.name:m.h, aN = aR?aR.name:m.a;
    try {
      await calFetch('PATCH', `${GCAL_API}/${id}`, token, {
        summary: `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
        description: `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
      });
    } catch {}
    done++;
    prog.upd(done, allKO.length, `Actualizando: ${done}/${allKO.length}`);
    await new Promise(r=>setTimeout(r,110));
  }
  prog.done(`✅ <strong style="color:#e8e8f0">${allKO.length} llaves actualizadas</strong> en tu Google Calendar.`);
}

// ─────────────────────────────────────────────
// AUTO-SYNC: actualiza el Calendar en background
// cuando un slot de llaves pasa de "Gan. MXX" → equipo real
// ─────────────────────────────────────────────

// Devuelve el array ordenado de todos los slots KO en el mismo orden
// que fueron guardados en gcal_ko_ids durante doCreateAll()
function getAllKOSlots() {
  return [
    ...R32.map(m => ({m, s:'16vos de Final'})),
    ...R16.map(m => ({m, s:'Octavos de Final'})),
    ...QF.map(m  => ({m, s:'Cuartos de Final'})),
    ...SF.map(m  => ({m, s:'Semifinal'})),
    ...FINALS.map((m,i) => ({m, s:i===0?'3er Puesto':'Final'})),
  ];
}

// Lee el nombre resuelto actual de cada slot (null si aún no se conoce)
function snapshotKOState() {
  return getAllKOSlots().map(({m}) => {
    const hR = m.hTeam ? {name:m.hTeam, confirmed:true} : resolveSlot(m.h);
    const aR = m.aTeam ? {name:m.aTeam, confirmed:true} : resolveSlot(m.a);
    return {
      h: (hR && hR.confirmed) ? hR.name : null,
      a: (aR && aR.confirmed) ? aR.name : null,
    };
  });
}

// Guarda y lee el último snapshot sincronizado con Calendar
function saveKOSnap(snap) {
  try { localStorage.setItem('gcal_ko_snap', JSON.stringify(snap)); } catch {}
}
function loadKOSnap() {
  try { return JSON.parse(localStorage.getItem('gcal_ko_snap')) || []; } catch { return []; }
}

// Hace PATCH silencioso de los slots que cambiaron
async function autoSyncKOCalendar() {
  const koIds = loadKOEventIds();
  if (!koIds.length) return;

  // Necesitamos que los datos de grupos estén cargados para resolver slots
  if (!espnLoaded) return;

  const current = snapshotKOState();
  const prev    = loadKOSnap();

  // Detectar slots que cambiaron: null → nombre real, o nombre distinto
  const changed = [];
  current.forEach((cur, i) => {
    const old = prev[i] || {h:null, a:null};
    if (cur.h && cur.h !== old.h) changed.push(i);
    else if (cur.a && cur.a !== old.a) changed.push(i);
  });

  if (!changed.length) return;

  // Acumular pendientes
  try {
    const existing = JSON.parse(localStorage.getItem('gcal_ko_pending')||'[]');
    const merged   = [...new Set([...existing, ...changed])];
    localStorage.setItem('gcal_ko_pending', JSON.stringify(merged));
  } catch {}

  // Intentar con token cacheado (silencioso total)
  const token = loadToken();
  if (token) {
    await flushPendingKOSync(token);
    return;
  }

  // Sin token: banner de un toque, una vez por sesión
  if (sessionStorage.getItem('cal_sync_prompted')) return;
  sessionStorage.setItem('cal_sync_prompted', '1');
  showCalSyncBanner(changed.length);
}

// Procesa pendientes acumulados (se llama cuando hay token disponible)
// Etiqueta corta para un slot cuando el equipo no está confirmado aún
// "1ro Grupo J" → "1ro J" | "2do Grupo H" → "2do H" | "Gan. M89" → "G.M89"
// "3ro A/B/C/D/F" → "3ro*" | "Perd. M101" → "P.M101"
function slotLabel(slot) {
  const m1 = slot.match(/^1ro Grupo ([A-L])$/);
  if (m1) return `1ro ${m1[1]}`;
  const m2 = slot.match(/^2do Grupo ([A-L])$/);
  if (m2) return `2do ${m2[1]}`;
  if (slot.startsWith('3ro')) return '3ro*';
  if (slot.startsWith('Gan. M')) return slot.replace('Gan. ', 'G.');
  if (slot.startsWith('Perd. M')) return slot.replace('Perd. ', 'P.');
  return slot;
}

async function flushPendingKOSync(token) {
  const pending = JSON.parse(localStorage.getItem('gcal_ko_pending')||'[]');
  if (!pending.length) return;

  const map = await buildKOEventMap(token);
  const current = snapshotKOState(); // solo confirmed===true tienen nombre
  const slots   = getAllKOSlots();
  let updated = 0;

  if (map) {
    for (const i of pending) {
      const {m, s} = slots[i];
      const id = map[m.n];
      if (!id) continue;
      const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
      // Nombre confirmado si existe, etiqueta corta si no
      const hN = current[i]?.h ? es(current[i].h) : slotLabel(m.h);
      const aN = current[i]?.a ? es(current[i].a) : slotLabel(m.a);
      try {
        await calFetch('PATCH', `${GCAL_API}/${id}`, token, {
          summary: `⚽ ${hN} vs ${aN} — ${s} Mundial 2026`,
          description: `${s} · ${m.n}\nHorario Argentina: ${time} hs (${date})\n\n${FIXTURE_URL}`,
        });
        updated++;
      } catch {}
      await new Promise(r => setTimeout(r, 120));
    }
  }

  saveKOSnap(current);
  localStorage.removeItem('gcal_ko_pending');
  if (updated) showToast(`📅 Calendar actualizado (${updated} partido${updated>1?'s':''})`);
}

// ─────────────────────────────────────────────
// FAIR PLAY — tarjetas reales vía ESPN summary endpoint
// El scoreboard NO trae statistics útiles por equipo; hay que pedir
// summary?event={id} por cada partido finalizado (boxscore.teams[].statistics).
// Se cachea por eventId en localStorage porque un partido FT no cambia más.
// El fetch de partidos nuevos corre en segundo plano (no bloquea el render):
// parseCards() recalcula de inmediato con lo ya cacheado y dispara el resto
// sin esperar; cuando termina, re-renderiza grupos/terceros/llaves.
// ─────────────────────────────────────────────
let teamCards = {};       // name → puntos negativos fair play (derivado de teamCardCounts)
let teamCardCounts = {};  // name → {yc, rc} conteo real, para mostrar en la solapa Datos

function loadCardCache() {
  // v2: guarda conteo crudo {yc,rc} por equipo, no puntos. Key nueva para no
  // chocar con cachés viejas (v1 guardaba un número plano por equipo).
  try { return JSON.parse(localStorage.getItem('card_cache_v2')) || {}; } catch { return {}; }
}
function saveCardCache() {
  try { localStorage.setItem('card_cache_v2', JSON.stringify(cardCache)); } catch {}
}
let cardCache = loadCardCache(); // eventId → { teamName: {yc,rc} } (solo fetches exitosos)

function recomputeTeamCards() {
  teamCards = {};
  teamCardCounts = {};
  Object.values(cardCache).forEach(teamStats => {
    Object.entries(teamStats).forEach(([name, c]) => {
      const yc = c?.yc || 0, rc = c?.rc || 0;
      teamCards[name] = (teamCards[name] || 0) + yc * 1 + rc * 4;
      if (!teamCardCounts[name]) teamCardCounts[name] = { yc: 0, rc: 0 };
      teamCardCounts[name].yc += yc;
      teamCardCounts[name].rc += rc;
    });
  });
}

async function fetchSummaryCards(eventId) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`;
  const data = await fetchJSON(url);
  if (!data) return null; // fetch falló (proxy/timeout) — NO cachear, reintentar en el próximo refresh
  const result = {};
  const teams = data?.boxscore?.teams || [];
  if (!teams.length) {
    console.warn(`[fairplay] summary event=${eventId} sin boxscore.teams — revisar shape de respuesta ESPN`);
  }
  teams.forEach(t => {
    const name = norm(t.team?.displayName || t.team?.name || '');
    if (!name) {
      console.warn(`[fairplay] summary event=${eventId} equipo sin nombre reconocible`, t.team);
      return;
    }
    let yc = 0, rc = 0;
    (t.statistics || []).forEach(s => {
      const abbr = (s.abbreviation || s.name || '').toUpperCase();
      const val = parseInt(s.displayValue ?? s.value ?? 0) || 0;
      if (abbr === 'YC' || abbr === 'YELLOWCARDS') yc += val;
      if (abbr === 'RC' || abbr === 'REDCARDS') rc += val; // ESPN no distingue roja directa de doble amarilla
    });
    result[name] = { yc, rc }; // {yc:0,rc:0} = partido sin tarjetas, válido y cacheable
  });
  return result;
}

async function fetchPendingCards(pending) {
  let updated = false;
  for (const ev of pending) {
    const cards = await fetchSummaryCards(ev.id);
    if (cards !== null) { cardCache[ev.id] = cards; updated = true; }
    await new Promise(r => setTimeout(r, 150)); // no saturar el proxy
  }
  if (updated) {
    saveCardCache();
    recomputeTeamCards();
    // Re-renderizar todo lo que depende de fair play / goles, ahora que llegaron datos nuevos
    renderGroups();
    renderTerceros();
    renderKO();
    renderDatos();
  }
}

function parseCards(scoreData) {
  recomputeTeamCards(); // con lo que ya esté en cache, sin esperar red
  if (!scoreData?.events) return;
  const finished = scoreData.events.filter(ev => ev.status?.type?.name === 'STATUS_FULL_TIME');
  const pending = finished.filter(ev => !cardCache[ev.id]);
  if (!pending.length) return;
  fetchPendingCards(pending); // fire-and-forget: no bloquea el render actual
}

// Puntos de fair play (menor = mejor disciplina) — negativo acumulado
function fairPlayPen(name) { return teamCards[norm(name)] || teamCards[name] || 0; }
// Conteo real de tarjetas para mostrar (no para ordenar tie-breaks)
function cardCountsFor(name) { return teamCardCounts[norm(name)] || teamCardCounts[name] || { yc: 0, rc: 0 }; }

// Busca el resultado del enfrentamiento directo entre dos equipos
function getMatchResult(h, a) {
  const key1 = `${norm(h)}|${norm(a)}`;
  const key2 = `${norm(a)}|${norm(h)}`;
  const sc1 = liveScores[key1];
  const sc2 = liveScores[key2];
  if (sc1 && sc1.status === 'STATUS_FULL_TIME' && sc1.hs !== '-' && sc1.as !== '-') {
    return { hg: parseInt(sc1.hs), ag: parseInt(sc1.as) };
  }
  if (sc2 && sc2.status === 'STATUS_FULL_TIME' && sc2.hs !== '-' && sc2.as !== '-') {
    return { hg: parseInt(sc2.as), ag: parseInt(sc2.hs) };
  }
  return null;
}

// Puntos head-to-head entre un subconjunto de equipos
function headToHeadStats(teams) {
  const stats = {};
  teams.forEach(t => { stats[norm(t.name)] = {pts:0, dg:0, gf:0}; });
  for (let i = 0; i < teams.length; i++) {
    for (let j = i+1; j < teams.length; j++) {
      const h = norm(teams[i].name);
      const a = norm(teams[j].name);
      const r = getMatchResult(h, a);
      if (!r) continue;
      stats[h].gf += r.hg; stats[h].dg += r.hg - r.ag;
      stats[a].gf += r.ag; stats[a].dg += r.ag - r.hg;
      if (r.hg > r.ag)       { stats[h].pts += 3; }
      else if (r.hg === r.ag){ stats[h].pts += 1; stats[a].pts += 1; }
      else                   { stats[a].pts += 3; }
    }
  }
  return stats;
}

// Criterios FIFA 2026 completos:
// 1. PTS general
// 2. H2H PTS · 3. H2H DIF · 4. H2H GF
// 5. DIF general · 6. GF general
// 7. Fair play (menor penalización gana)
// 8. Ranking FIFA (menor número = mejor)
function sortStandings(teams) {
  // Sort inicial completo: PTS → DIF → GF → fair play → ranking FIFA
  // (sirve como base estable antes de aplicar head-to-head)
  const sorted = [...teams].sort((a,b) =>
    b.pts - a.pts
    || b.dg  - a.dg
    || b.gf  - a.gf
    || fairPlayPen(a.name) - fairPlayPen(b.name)   // menor penalización = mejor
    || fifaRank(a.name)   - fifaRank(b.name)        // menor ranking = mejor
  );

  // Ahora resolver empates en PTS con head-to-head (criterios 2-4 FIFA)
  // Solo aplica cuando hay empate real en puntos
  let i = 0;
  while (i < sorted.length) {
    let j = i;
    while (j < sorted.length && sorted[j].pts === sorted[i].pts) j++;
    const tied = sorted.slice(i, j);
    if (tied.length > 1) {
      const h2h = headToHeadStats(tied);
      // Verificar si hay diferencia en H2H (si no, dejamos el orden del sort base)
      const allH2HEqual = tied.every(t => {
        const h = h2h[norm(t.name)] || {pts:0,dg:0,gf:0};
        const h0 = h2h[norm(tied[0].name)] || {pts:0,dg:0,gf:0};
        return h.pts === h0.pts && h.dg === h0.dg && h.gf === h0.gf;
      });
      if (!allH2HEqual) {
        tied.sort((a, b) => {
          const ha = h2h[norm(a.name)] || {pts:0,dg:0,gf:0};
          const hb = h2h[norm(b.name)] || {pts:0,dg:0,gf:0};
          return hb.pts - ha.pts          // H2H puntos
              || hb.dg  - ha.dg          // H2H dif gol
              || hb.gf  - ha.gf          // H2H goles a favor
              || b.dg   - a.dg           // DIF general
              || b.gf   - a.gf           // GF general
              || fairPlayPen(a.name) - fairPlayPen(b.name)
              || fifaRank(a.name)   - fifaRank(b.name);
        });
        for (let k = 0; k < tied.length; k++) sorted[i+k] = tied[k];
      }
      // Si H2H también es todo igual → el sort base ya aplicó fair play y ranking FIFA
    }
    i = j;
  }
  return sorted;
}

function getGroupStandings(letter) {
  const src = standingsData[letter];
  if (!src || !src.length)
    return GROUPS_STATIC[letter].map(name => ({name,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0}));
  return sortStandings(src);
}

function groupMatchesPlayed(letter) {
  // Fuente más confiable: fecha del último partido del grupo en el schedule local
  // Si todos los partidos del grupo ya pasaron, el grupo terminó → devolver MATCHES_PER_GROUP
  const groupMatches = MATCHES.filter(m => m.g === letter);
  if (groupMatches.length > 0) {
    const now = Date.now();
    const lastMatchET = groupMatches.reduce((max, m) => {
      // Construir Date UTC del partido: et[0] horas ET, et[1] minutos ET (UTC-4 en verano)
      // Sumamos 4h para convertir ET→UTC, más 2h de margen para que termine
      const d = m.d; // "Mié 24 Jun"
      // Usar etToArg para obtener la hora Argentina y luego convertir a timestamp
      const {time} = etToArg(m.d, m.et[0], m.et[1]);
      // El partido dura ~2hs. Construir timestamp aproximado del fin del partido.
      // Usamos los partidos con STATUS_FULL_TIME en liveScores como confirmación
      return Math.max(max, 0); // placeholder — ver abajo
    }, 0);

    // Método directo: si hay 6 partidos del grupo en liveScores con STATUS_FULL_TIME → completo
    const teamsLower = (GROUPS_STATIC[letter] || []).map(n => norm(n).toLowerCase());
    let ftCount = 0;
    Object.entries(liveScores).forEach(([key, sc]) => {
      if (sc.status !== 'STATUS_FULL_TIME') return;
      const [h, a] = key.split('|');
      if (teamsLower.includes(h.toLowerCase()) && teamsLower.includes(a.toLowerCase())) ftCount++;
    });
    if (ftCount >= MATCHES_PER_GROUP) return MATCHES_PER_GROUP;

    // Método por standingsData (más confiable para grupos viejos)
    const src = standingsData[letter];
    if (src && src.length >= 4) {
      const minPJ = Math.min(...src.map(t => t.pj || 0));
      if (minPJ >= 3) return MATCHES_PER_GROUP;
      const totalPJ = src.reduce((acc, t) => acc + (t.pj||0), 0);
      const fromStandings = Math.floor(totalPJ / 2);
      if (fromStandings > 0) return fromStandings;
    }

    // Método por fecha: si el último partido del grupo termina hace más de 2 horas → completo
    // etToArg convierte ET a Argentina (ET = UTC-4, ARG = UTC-3, diferencia = +1h)
    const lastMatch = groupMatches[groupMatches.length - 1];
    const {time: lastTime, date: lastDate} = etToArg(lastMatch.d, lastMatch.et[0], lastMatch.et[1]);
    // Parsear hora Argentina del último partido + 2hs de margen
    const [hh, mm] = lastTime.split(':').map(Number);
    // Meses en español → número
    const monthMap = {'Ene':0,'Feb':1,'Mar':2,'Abr':3,'May':4,'Jun':5,'Jul':6,'Ago':7,'Sep':8,'Oct':9,'Nov':10,'Dic':11};
    const parts = lastDate.split(' '); // ["Mié", "24", "Jun"]
    if (parts.length >= 3) {
      const month = monthMap[parts[2]];
      const day = parseInt(parts[1]);
      if (month !== undefined) {
        // Argentina = UTC-3
        const endUTC = Date.UTC(2026, month, day, hh + 3 + 2, mm); // +3 para UTC, +2 de duración
        if (now > endUTC) return MATCHES_PER_GROUP;
      }
    }
  }

  return 0;
}

function allGroupsFinished() {
  return Object.keys(GROUPS_STATIC).every(l => groupMatchesPlayed(l) >= MATCHES_PER_GROUP);
}
function someGroupsStarted() {
  return Object.keys(GROUPS_STATIC).some(l => groupMatchesPlayed(l) > 0);
}

// Returns {name, confirmed} or null
function getClassified(groupLetter, position) {
  const standings = getGroupStandings(groupLetter);
  const played = groupMatchesPlayed(groupLetter);
  const team = standings[position - 1];
  if (!team || team.pj === 0) return null;
  const confirmed = played >= MATCHES_PER_GROUP;
  return { name: team.name, confirmed };
}

// ─────────────────────────────────────────────
// BEST THIRDS — real-time ranking
// Returns array of up to 12 objects sorted by pts/DG/GF
// each: {name, group, pts, dg, gf, pj, confirmed}
// ─────────────────────────────────────────────
function getAllThirds() {
  const thirds = [];
  Object.keys(GROUPS_STATIC).forEach(letter => {
    const standings = getGroupStandings(letter);
    const played = groupMatchesPlayed(letter);
    const t = standings[2];
    if (t && t.pj > 0) {
      thirds.push({ ...t, group: letter, confirmed: played >= MATCHES_PER_GROUP });
    }
  });
  return thirds.sort((a,b) => b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
}

function getBestThirds() {
  return getAllThirds().slice(0, 8);
}

// ─────────────────────────────────────────────
// DATOS — estadísticas por país (goles y tarjetas)
// Aplana las 12 tablas de grupo en una sola lista de 48 países.
// No depende de fetches nuevos: reusa standingsData (goles) y
// teamCardCounts (tarjetas, ya cargado por parseCards/fetchPendingCards).
// ─────────────────────────────────────────────
function getCountryStats() {
  const rows = [];
  Object.keys(GROUPS_STATIC).forEach(letter => {
    getGroupStandings(letter).forEach(t => {
      const c = cardCountsFor(t.name);
      rows.push({
        name: t.name,
        group: letter,
        pj: t.pj, gf: t.gf || 0, gc: t.gc || 0,
        dg: (typeof t.dg === 'number') ? t.dg : (t.gf||0)-(t.gc||0),
        pts: t.pts,
        yc: c.yc, rc: c.rc,
      });
    });
  });
  return rows;
}

// ─────────────────────────────────────────────
// FIFA 2026 THIRD-PLACE BRACKET ASSIGNMENT
// The slot label in R32 lists which groups' thirds can fill it.
// Once all groups finish, we know the exact 8 best thirds and
// their source groups → we map each slot to the right team.
//
// Slot format: "3ro A/B/C/D/F" means: the best third from
// among groups A, B, C, D, F (whichever qualified) goes here.
// Since FIFA hasn't published the exact 2026 assignment table yet,
// we use the logical approach: parse the groups listed in the slot,
// intersect with the actual best-8 thirds' groups, pick the match.
//
// IMPORTANT: groups overlap across slots (e.g. group F appears in 5 of
// the 8 slots), so picking each slot's best candidate independently can
// assign the SAME team to more than one slot at once. assignBestThirds()
// solves this as a bipartite matching (Kuhn's algorithm) over the 8
// slots × 8 best-thirds, guaranteeing no team is reused when a valid
// assignment exists.
// ─────────────────────────────────────────────
function getThirdSlotStrings() {
  // Orden fijo = orden de aparición en R32 (M74,M77,M79,M80,M82,M81,M85,M87)
  return R32.filter(m => typeof m.a === 'string' && m.a.startsWith('3ro')).map(m => m.a);
}

function assignBestThirds() {
  const best8 = getBestThirds();
  const slots = getThirdSlotStrings();
  const candBySlot = slots.map(s => {
    const groups = s.replace('3ro ', '').split('/');
    return best8.map((t, idx) => idx).filter(idx => groups.includes(best8[idx].group));
  });

  const matchTeam = new Array(best8.length).fill(-1); // teamIdx -> slotIdx asignado
  const assign = new Array(slots.length).fill(-1);    // slotIdx -> teamIdx asignado

  function tryAssign(slotIdx, visited) {
    for (const teamIdx of candBySlot[slotIdx]) {
      if (visited[teamIdx]) continue;
      visited[teamIdx] = true;
      if (matchTeam[teamIdx] === -1 || tryAssign(matchTeam[teamIdx], visited)) {
        matchTeam[teamIdx] = slotIdx;
        assign[slotIdx] = teamIdx;
        return true;
      }
    }
    return false;
  }

  for (let s = 0; s < slots.length; s++) tryAssign(s, new Array(best8.length).fill(false));

  const result = {};
  slots.forEach((slotStr, i) => { result[slotStr] = (assign[i] === -1) ? null : best8[assign[i]]; });
  return result;
}

function resolveThirdSlot(slot) {
  const best8 = getBestThirds();
  const team = assignBestThirds()[slot];
  if (!team) return null;

  // If all groups are finished we know for sure
  const allDone = allGroupsFinished();

  // "Confirmed" only when all groups are done AND we have enough thirds
  return { name: team.name, confirmed: allDone && best8.length >= 8, provisional: !allDone };
}

// ─────────────────────────────────────────────
// RESOLVE ANY SLOT — incluyendo ganadores KO recursivos
// ─────────────────────────────────────────────

// Índice de todos los partidos KO por número para lookup rápido
function getKOMatchByN(n) {
  return [...R32, ...R16, ...QF, ...SF, ...FINALS].find(m => m.n === n) || null;
}

// Resuelve quién jugó y quién ganó/perdió un partido KO dado su número.
// Retorna {h: nombre, a: nombre, winner: nombre|null, loser: nombre|null}
// Retorna null si no se pueden resolver ambos equipos todavía.
function resolveKOMatch(matchN) {
  const m = getKOMatchByN(matchN);
  if (!m) return null;

  const hRes = resolveSlotFull(m.h);
  const aRes = resolveSlotFull(m.a);
  if (!hRes || !aRes) return null;

  const h = hRes.name;
  const a = aRes.name;
  const hNorm = norm(h);
  const aNorm = norm(a);

  // Buscar score — ESPN puede tener los equipos en cualquier orden
  let sc = null;
  let espnH = true; // true = ESPN tiene h como local, false = ESPN los invirtió

  if (liveScores[`${hNorm}|${aNorm}`]) {
    sc = liveScores[`${hNorm}|${aNorm}`];
    espnH = true;
  } else if (liveScores[`${h}|${a}`]) {
    sc = liveScores[`${h}|${a}`];
    espnH = true;
  } else if (liveScores[`${aNorm}|${hNorm}`]) {
    sc = liveScores[`${aNorm}|${hNorm}`];
    espnH = false; // ESPN tiene a como "home" — hs corresponde a `a`, as corresponde a `h`
  } else if (liveScores[`${a}|${h}`]) {
    sc = liveScores[`${a}|${h}`];
    espnH = false;
  }

  if (!sc || sc.status !== 'STATUS_FULL_TIME') {
    return { h, a, winner: null, loser: null };
  }

  // Asignar scores correctamente según el orden de ESPN
  const hScore = espnH ? (parseInt(sc.hs)||0) : (parseInt(sc.as)||0);
  const aScore = espnH ? (parseInt(sc.as)||0) : (parseInt(sc.hs)||0);

  // En KO no hay empate — mayor score gana (penales incluidos en el score final)
  const winner = hScore >= aScore ? h : a;
  const loser  = hScore >= aScore ? a : h;
  return { h, a, winner, loser };
}

// Cache para evitar resolver recursivamente lo mismo en cada render
let _resolveCache = {};
function clearResolveCache() { _resolveCache = {}; }

function resolveSlot(slot) {
  return resolveSlotFull(slot);
}

function resolveSlotFull(slot) {
  if (_resolveCache[slot] !== undefined) return _resolveCache[slot];

  let result = null;

  // Grupos
  const m1 = slot.match(/^1ro Grupo ([A-L])$/);
  if (m1) { result = getClassified(m1[1], 1); }
  else {
    const m2 = slot.match(/^2do Grupo ([A-L])$/);
    if (m2) { result = getClassified(m2[1], 2); }
    else if (slot.startsWith('3ro')) { result = resolveThirdSlot(slot); }
    // Ganador de partido KO
    else if (slot.startsWith('Gan. M')) {
      const matchN = slot.replace('Gan. ', '');
      const ko = resolveKOMatch(matchN);
      result = ko?.winner ? { name: ko.winner, confirmed: true } : null;
    }
    // Perdedor de partido KO (para 3er puesto)
    else if (slot.startsWith('Perd. M')) {
      const matchN = slot.replace('Perd. ', '');
      const ko = resolveKOMatch(matchN);
      result = ko?.loser ? { name: ko.loser, confirmed: true } : null;
    }
  }

  _resolveCache[slot] = result;
  return result;
}

// Limpiar cache cada vez que llegan datos nuevos
function onLiveDataUpdated() {
  clearResolveCache();
}

// ─────────────────────────────────────────────
// BRACKET TREE RENDER
// ─────────────────────────────────────────────

// Builds one match card for the bracket
function bracketCard(m, extraClass) {
  const hResolved = m.hTeam ? {name:m.hTeam,confirmed:true} : resolveSlot(m.h);
  const aResolved = m.aTeam ? {name:m.aTeam,confirmed:true} : resolveSlot(m.a);

  const hName = hResolved ? hResolved.name : m.h;
  const aName = aResolved ? aResolved.name : m.a;
  const hKnown = !!hResolved;
  const aKnown = !!aResolved;

  const sc = (hResolved && aResolved && m.hTeam && m.aTeam)
    ? getScore(hResolved.name, aResolved.name) : null;
  const hasScore = sc && sc.status !== 'STATUS_SCHEDULED';
  const isLive   = sc && sc.status === 'STATUS_IN_PROGRESS';
  const isFT     = sc && sc.status === 'STATUS_FULL_TIME';

  // Determine winner for highlighting
  let hWin = false, aWin = false;
  if (isFT && hasScore) {
    hWin = sc.hs > sc.as;
    aWin = sc.as > sc.hs;
  }

  const teamRow = (resolved, known, name, win) => {
    const flagHtml = known
      ? `<div class="bflag">${flag(resolved.name, 14)}</div>`
      : `<div class="bflag"><span style="font-size:12px;opacity:.25">⬜</span></div>`;
    const nameClass = !known ? 'tbd' : (!resolved.confirmed ? 'provisional' : '');
    const clickAttr = known ? teamClick(resolved.name) : '';
    const rowClass = isLive && win ? 'live-winner' : (win ? 'winner' : '');
    const scoreVal = hasScore ? (win ? (win === hWin ? sc.hs : sc.as) : '') : '';
    // pick correct score per team
    const hs = hasScore ? sc.hs : '';
    const as = hasScore ? sc.as : '';
    return ``;
  };

  // Build team rows manually to get scores right
  const hFlagH = hKnown ? `<div class="bflag">${flag(hResolved.name,14)}</div>` : `<div class="bflag"><span style="font-size:11px;opacity:.25">⬜</span></div>`;
  const aFlagH = aKnown ? `<div class="bflag">${flag(aResolved.name,14)}</div>` : `<div class="bflag"><span style="font-size:11px;opacity:.25">⬜</span></div>`;
  const hNameC = !hKnown ? 'tbd' : (!hResolved.confirmed ? 'provisional' : '');
  const aNameC = !aKnown ? 'tbd' : (!aResolved.confirmed ? 'provisional' : '');
  const hClick = hKnown ? teamClick(hResolved.name) : '';
  const aClick = aKnown ? teamClick(aResolved.name) : '';
  const hRowC  = (isFT||isLive) && hWin ? (isLive?'live-winner':'winner') : '';
  const aRowC  = (isFT||isLive) && aWin ? (isLive?'live-winner':'winner') : '';

  const {time, date} = etToArg(m.d, m.et[0], m.et[1]);
  const tooltip = isLive ? `🔴 VIVO` : `${time} hs · ${date} · ${m.v}`;

  const metaLine = isLive
    ? `<div class="bmeta live-meta">🔴 EN VIVO · ${m.v}</div>`
    : `<div class="bmeta">${time} hs · ${date} · ${m.v}</div>`;

  return `<div class="bcard${extraClass?' '+extraClass:''}${isLive?' live-card':''}">
    <div class="bmatch-label">${m.n}${isLive?' 🔴':''}</div>
    <div class="bteam ${hRowC}" ${hClick}>${hFlagH}<span class="bname ${hNameC}">${es(hName)}</span><span class="bscore">${hasScore?sc.hs:''}</span></div>
    <div class="bteam ${aRowC}" ${aClick}>${aFlagH}<span class="bname ${aNameC}">${es(aName)}</span><span class="bscore">${hasScore?sc.as:''}</span></div>
    ${metaLine}
  </div>`;
}

// SVG connector lines between rounds
function connectorSVG(pairs) {
  // pairs = number of match pairs to connect (8 for 16→8, 4 for 8→4, etc.)
  const step = 100 / pairs;
  let lines = '';
  for (let i = 0; i < pairs; i++) {
    const y1 = (i * 2 + 0.5) * step;
    const y2 = (i * 2 + 1.5) * step;
    const ym = (y1 + y2) / 2;
    lines += `<line x1="0" y1="${y1}%" x2="7" y2="${y1}%" stroke="#2a2a3a" stroke-width="1.5"/>
<line x1="0" y1="${y2}%" x2="7" y2="${y2}%" stroke="#2a2a3a" stroke-width="1.5"/>
<line x1="7" y1="${y1}%" x2="7" y2="${y2}%" stroke="#2a2a3a" stroke-width="1.5"/>
<line x1="7" y1="${ym}%" x2="14" y2="${ym}%" stroke="#2a2a3a" stroke-width="1.5"/>`;
  }
  return `<svg class="connector-svg" viewBox="0 0 14 100" preserveAspectRatio="none">${lines}</svg>`;
}

function renderKO() {
  const started  = someGroupsStarted();
  const allDone  = allGroupsFinished();
  const ROW_H    = 54; // approx px per match card
  const totalH   = R32.length * ROW_H;

  let legend = '';
  if (!started) {
    legend = `<div class="ko-legend pending">⏳ Las llaves se irán completando a medida que avance la fase de grupos. Quedarán <strong>confirmadas</strong> al terminar todos los partidos el <strong>27 de junio</strong>.</div>`;
  } else if (!allDone) {
    legend = `<div class="ko-legend inprogress">🔄 Llaves actualizándose en tiempo real. Quedarán <strong>confirmadas</strong> al terminar la fase de grupos el <strong>27 de junio</strong>.</div>`;
  } else {
    legend = `<div class="ko-legend done">✅ Fase de grupos finalizada — todas las llaves están <strong>confirmadas</strong>.</div>`;
  }

  // R32 en orden de árbol visual (cada par adyacente → un cruce de octavos)
  // R32 sigue en orden cronológico para que los IDs de Calendar no rompan
  const R32_VISUAL = [2,5,0,3,11,10,9,8,1,4,6,7,14,13,12,15].map(i => R32[i]);

  // R16 también reordenado para que sus conectores queden alineados con R32_VISUAL
  // M89+M90 → M97; M93+M94 → M98; M91+M92 → M99; M95+M96 → M100
  const R16_VISUAL = [1,0,4,5,2,3,6,7].map(i => R16[i]);
  // QF: M97=Gan.M89+M90→pos0-1; M98=Gan.M93+M94→pos2-3; M99=Gan.M91+M92→pos4-5; M100=Gan.M95+M96→pos6-7
  const QF_VISUAL = [0,1,2,3].map(i => QF[i]);

  // ── Build round columns ──
  const rounds = [
    { label:'16vos de Final', sub:'28 Jun – 3 Jul',   matches: R32_VISUAL, pairs: 8,  cls: '' },
    { label:'Octavos',        sub:'4 – 7 Jul',         matches: R16_VISUAL, pairs: 4,  cls: '' },
    { label:'Cuartos',        sub:'9 – 11 Jul',        matches: QF_VISUAL,  pairs: 2,  cls: '' },
    { label:'Semifinales',    sub:'14 – 15 Jul',       matches: SF,         pairs: 1,  cls: 'sf-card' },
  ];

  let cols = '';
  rounds.forEach((r, ri) => {
    // Match column
    const slots = r.matches.map(m =>
      `<div class="bslot">${bracketCard(m, r.cls)}</div>`
    ).join('');
    cols += `<div class="round-col">
      <div class="round-hdr">${r.label}<span>${r.sub}</span></div>
      <div class="matches-col" style="min-height:${totalH}px">${slots}</div>
    </div>`;

    // Connector (skip after last round before final)
    if (ri < rounds.length) {
      cols += `<div class="connector-col" style="min-height:${totalH}px">${connectorSVG(r.pairs)}</div>`;
    }
  });

  // Final + 3rd place column
  const finalM = FINALS[1]; // 🏆
  const thirdM = FINALS[0]; // 3°
  cols += `<div class="round-col" style="min-width:130px">
    <div class="round-hdr">Final<span>19 Jul · Nueva York</span></div>
    <div class="matches-col" style="min-height:${totalH}px">
      <div class="bslot" style="flex:1;justify-content:center">
        <div class="trophy-box">
          <span class="trophy-icon">🏆</span>
          <div class="trophy-lbl">Final</div>
          <div class="trophy-date">Dom 19 Jul · New York/NJ</div>
        </div>
        ${bracketCard(finalM, 'final-card')}
        <div class="third-box">
          <div class="third-lbl">🥉 3er Puesto · Sáb 18 Jul</div>
          ${bracketCard(thirdM, '')}
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('koContainer').innerHTML =
    legend +
    `<div class="bracket-wrap"><div class="bracket-tree">${cols}</div></div>` +
    `<div class="bracket-note">Deslizá → para ver el cuadro completo · Horarios en Argentina (UTC-3)</div>`;
}

  const byGoals = [...stats].sort((a,b) => b.gf - a.gf || b.dg - a.dg || a.gc - b.gc);

  const TOP_N = 10;

    ? `<div class="ver-mas-btn" onclick="toggleDatosExpand('cards')">${datosExpanded.cards ? 'Ver menos ▲' : `Ver los ${byCards.length} equipos ▼`}</div>`
    : '';
  const goalsMoreBtn = byGoals.length > TOP_N
    ? `<div class="ver-mas-btn" onclick="toggleDatosExpand('goals')">${datosExpanded.goals ? 'Ver menos ▲' : `Ver los ${byGoals.length} equipos ▼`}</div>`
    : '';

  el.innerHTML = `
    <div class="stats-section" style="margin:12px 16px">
      <div class="stats-section-hdr">🟨🟥 Tarjetas por País</div>
      ${cardRows}
      ${cardsMoreBtn}

      <button onclick="dismissBanner()" style="background:transparent;border:1px solid #2a2a3a;color:#6b6b85;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Ahora no</button>
      <button onclick="installApp()" style="background:#c8a84b;border:none;color:#000;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Instalar</button>
    </div>`;
  document.body.appendChild(b);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissBanner();
}

function dismissBanner() {
  const b = document.getElementById('installBanner');
  if (b) b.remove();
}

// iOS: hint si no está instalada y es Safari
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    if (document.getElementById('installBanner')) return;
    const h = document.createElement('div');
    h.id = 'installBanner';
    h.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a24;border-top:1px solid #2a2a3a;padding:14px 16px;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,.5);';
    h.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="background:#c8a84b;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px">🏆</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;color:#e8e8f0;margin-bottom:4px">Instalá en tu pantalla de inicio</div>
          <div style="font-size:12px;color:#6b6b85;line-height:1.5">Tocá <strong style="color:#c8a84b">Compartir ↑</strong> → <strong style="color:#c8a84b">"Agregar a pantalla de inicio"</strong></div>
        </div>
        <button onclick="dismissBanner()" style="background:transparent;border:none;color:#6b6b85;font-size:22px;cursor:pointer;padding:0;line-height:1">×</button>
      </div>`;
    document.body.appendChild(h);
  }, 3000);
}
</script>
